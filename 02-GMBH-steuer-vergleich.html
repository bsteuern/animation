<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#1DB8C6;font-family:"DM Sans",sans-serif;-webkit-font-smoothing:antialiased;display:flex;align-items:center;justify-content:center;overflow:hidden}
.stage{width:100%;height:100%;position:relative;overflow:hidden;background:transparent;display:flex;flex-direction:column;align-items:center;justify-content:center}
.stage-bg{position:absolute;inset:0;width:100%;height:100%}
.table-card{background:#fff;border-radius:.65em;overflow:hidden;box-shadow:0 .5em 2.5em rgba(0,0,0,.13);width:25.92em;opacity:0;transform:translateY(.4em);transition:opacity .7s cubic-bezier(.4,0,.2,1),transform .7s cubic-bezier(.16,1,.3,1);position:relative}
.tc-head{display:flex;border-bottom:2px solid #F2EDE5}
.th-empty{padding:.55em .85em;flex:1.4;font-size:.56em;font-weight:600;color:#8a9fae;letter-spacing:.08em;text-transform:uppercase}
.th-col{flex:1;padding:.55em .6em;text-align:center;font-size:.56em;font-weight:600;letter-spacing:.06em;text-transform:uppercase}
.th-col.bad{color:#8a9fae}
.th-col.good{background:#162D3E;color:#1DB8C6;text-transform:none;letter-spacing:.02em}
.tc-row{display:flex;align-items:stretch;opacity:0;transform:translateX(-.5em);transition:opacity .5s ease,transform .5s ease}
.tc-row.v{opacity:1;transform:none}
.tc-row+.tc-row{border-top:1px solid #F2EDE5}
.tc-row.savings-row{background:rgba(29,184,198,.06);border-top:1px solid rgba(29,184,198,.18) !important}
.tr-label{flex:1.4;padding:.48em .85em;font-size:.62em;color:#8a9fae;display:flex;align-items:center}
.savings-row .tr-label{color:#8a9fae;font-weight:500;padding:.62em .85em}
.tr-val{flex:1;padding:.48em .6em;text-align:center;font-size:.62em;display:flex;align-items:center;justify-content:center}
.tr-val.bad{color:rgba(22,45,62,.32);font-weight:400}
.tr-val.good{color:#162D3E;font-weight:600;background:rgba(29,184,198,.09)}
.savings-row .tr-val.bad{color:rgba(22,45,62,.32);font-weight:400;padding:.62em .6em}
.savings-row .tr-val.good{color:#162D3E;font-weight:700;font-size:.72em;background:rgba(29,184,198,.09);padding:.62em .6em}
</style></head><body>
<div class="stage" id="stage">
  <svg class="stage-bg" viewBox="0 0 316 316" preserveAspectRatio="xMidYMid slice" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect width="157.449" height="157.758" transform="matrix(1 8.74228e-08 8.65437e-08 -1 157.75 315.352)" fill="#00C0CA"/>
    <path d="M315.199 157.594C315.199 178.311 311.127 198.825 303.214 217.965C295.302 237.105 283.704 254.496 269.084 269.145C254.463 283.795 237.106 295.415 218.003 303.343C198.901 311.271 178.427 315.352 157.75 315.352L157.75 157.594L315.199 157.594Z" fill="#00A1AA"/>
    <rect width="157.449" height="157.758" transform="matrix(-4.37114e-08 1 1 4.28323e-08 0 157.758)" fill="#00C0CA"/>
    <path d="M157.758 315.207C137.041 315.207 116.527 311.135 97.3866 303.222C78.2466 295.31 60.8554 283.712 46.2063 269.091C31.5571 254.471 19.9367 237.114 12.0086 218.011C4.08053 198.908 -1.80937e-06 178.434 0 157.758L157.758 157.758L157.758 315.207Z" fill="#00A1AA"/>
    <rect width="157.602" height="157.758" transform="matrix(-4.37114e-08 -1 -1 4.45905e-08 315.203 157.602)" fill="#00A1AA"/>
    <path d="M157.445 -0.000184237C178.162 -0.000185161 198.676 4.07631 217.816 11.9965C236.957 19.9168 254.348 31.5256 268.997 46.1603C283.646 60.795 295.266 78.1688 303.195 97.29C311.123 116.411 315.203 136.905 315.203 157.602L157.445 157.602L157.445 -0.000184237Z" fill="#00C0CA"/>
    <rect width="157.602" height="157.758" transform="matrix(-1 -8.74228e-08 -8.65437e-08 1 157.609 0)" fill="#00A1AA"/>
    <path d="M0.00760758 157.758C0.00760937 137.041 4.08411 116.527 12.0043 97.3866C19.9246 78.2466 31.5334 60.8554 46.1681 46.2062C60.8028 31.5571 78.1766 19.9367 97.2978 12.0086C116.419 4.08053 136.913 -2.71492e-06 157.609 0L157.609 157.758L0.00760758 157.758Z" fill="#00C0CA"/>
  </svg>
  <div class="table-card" id="tc">
    <div class="tc-head">
      <div class="th-empty">Steuerart</div>
      <div class="th-col bad">Standard</div>
      <div class="th-col good">b'steuern</div>
    </div>
    <div class="tc-row" id="r0"><span class="tr-label">Körperschaftsteuer</span><span class="tr-val bad">15 %</span><span class="tr-val good">15 %</span></div>
    <div class="tc-row" id="r1"><span class="tr-label">Gewerbesteuer</span><span class="tr-val bad">~14 %</span><span class="tr-val good">angerechnet</span></div>
    <div class="tc-row" id="r2"><span class="tr-label">Verlustvorträge</span><span class="tr-val bad">ungenutzt</span><span class="tr-val good">optimiert</span></div>
    <div class="tc-row savings-row" id="r3"><span class="tr-label">Jahresersparnis</span><span class="tr-val bad">—</span><span class="tr-val good">−10.600 €</span></div>
  </div>
</div>
<script>
const stage=document.getElementById("stage");
function sf(){const w=stage.offsetWidth,h=stage.offsetHeight;document.documentElement.style.fontSize=Math.max(Math.min(Math.min(w/28,h/14),22),9)+"px"}
new ResizeObserver(sf).observe(stage);sf();
const tc=document.getElementById("tc"),rows=[0,1,2,3].map(i=>document.getElementById("r"+i));
const H=5000,DO=700;
function run(){
  tc.style.transition="none";tc.style.opacity="0";tc.style.transform="translateY(.4em)";
  rows.forEach(r=>{r.style.transition="none";r.classList.remove("v")});
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    setTimeout(()=>{tc.style.transition="opacity .7s cubic-bezier(.4,0,.2,1),transform .7s cubic-bezier(.16,1,.3,1)";tc.style.opacity="1";tc.style.transform="none"},150);
    rows.forEach((r,i)=>setTimeout(()=>r.classList.add("v"),600+i*500));
    setTimeout(()=>{tc.style.transition=`opacity ${DO}ms ease`;tc.style.opacity="0";setTimeout(run,DO+150)},600+4*500+H);
  }));
}
setTimeout(run,250);
</script></body></html>
