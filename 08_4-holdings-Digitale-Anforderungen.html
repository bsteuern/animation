<!DOCTYPE html><html lang="de"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>08_4</title><link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#6A6872}
.stage{
  position:relative;
  width:100%;
  aspect-ratio:1116/558;
  max-height:100%;
  background:#6A6872;
  overflow:hidden;
  font-family:'DM Sans',sans-serif;
  color:#0E0C1C;
}
.f{opacity:0;transition:opacity .55s ease}
.f.in{opacity:1}
.u{opacity:0;transform:translateY(7px);transition:opacity .5s ease,transform .5s cubic-bezier(.25,.46,.45,.94)}
.u.in{opacity:1;transform:translateY(0)}
.card{
  background:#F9F4EC;
  border-radius:18px;
  position:absolute;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  width:60%;
  overflow:hidden;
}
.ch{
  padding:.75em 1.2em;
  border-bottom:1px solid rgba(202,202,205,.35);
  display:flex;justify-content:space-between;align-items:center;
}
.ch-t{font-size:.8em;font-weight:600;color:#0E0C1C}
.cnt{
  font-size:.6em;font-weight:500;
  background:rgba(202,202,205,.3);
  border-radius:100px;
  padding:.14em .65em;
  color:#0E0C1C;
}
.item{
  display:flex;align-items:center;gap:.7em;
  padding:.58em 1.2em;
  border-bottom:1px solid rgba(202,202,205,.15);
}
.item:last-of-type{border-bottom:none}
.cb{
  width:1.4em;height:1.4em;border-radius:5px;
  border:1.5px solid #CACACD;
  flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:.68em;
  transition:all .3s ease;
}
.cb.done{background:#0E0C1C;border-color:#0E0C1C;color:#F9F4EC}
.it{font-size:.72em;font-weight:500;color:#0E0C1C}
.foot{
  padding:.72em 1.2em;
  background:#0E0C1C;
  border-radius:0 0 18px 18px;
  display:flex;justify-content:space-between;align-items:center;
}
.ft{font-size:.65em;color:#F9F4EC}
.fv{font-size:.65em;font-weight:600;color:#F9F4EC}
</style>
</head><body>
<div class="stage" id="stage">
<div class="card f" id="card">
  <div class="ch">
    <span class="ch-t">GoBD Compliance</span>
    <span class="cnt" id="cnt">0 / 4</span>
  </div>
  <div class="item u" id="i0"><div class="cb" id="cb0"></div><span class="it">Unveränderliche Aufzeichnung</span></div>
  <div class="item u" id="i1"><div class="cb" id="cb1"></div><span class="it">10-Jahres-Archivierung</span></div>
  <div class="item u" id="i2"><div class="cb" id="cb2"></div><span class="it">Vollständigkeit der Belege</span></div>
  <div class="item u" id="i3"><div class="cb" id="cb3"></div><span class="it">Nachvollziehbarkeit</span></div>
  <div class="foot f" id="foot">
    <span class="ft">Alle Anforderungen erfüllt</span>
    <span class="fv">Prüfbereit ✓</span>
  </div>
</div></div>
<script>const S=document.getElementById('stage');
const rz=()=>{
  const w=S.offsetWidth,h=S.offsetHeight;
  S.style.fontSize=Math.max(Math.min(Math.min(w/24,h/12),22),9)+'px';
};
new ResizeObserver(rz).observe(S);rz();
const wait=ms=>new Promise(r=>setTimeout(r,ms));
const $=id=>document.getElementById(id);
const show=id=>{const e=$(id);if(e)e.classList.add('in')};
const hide=id=>{const e=$(id);if(e)e.classList.remove('in')};
async function run(){
  hide('card');hide('foot');
  for(let i=0;i<4;i++){hide('i'+i);const c=$('cb'+i);if(c){c.className='cb';c.textContent=''}}
  $('cnt').textContent='0 / 4';
  await wait(300);show('card');await wait(400);
  for(let i=0;i<4;i++){
    show('i'+i);await wait(380);
    const c=$('cb'+i);if(c){c.className='cb done';c.textContent='✓';}
    $('cnt').textContent=(i+1)+' / 4';
    await wait(280);
  }
  await wait(400);show('foot');await wait(4500);run();
}
run();</script></body></html>
