<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#F6DF35;font-family:"DM Sans",sans-serif;-webkit-font-smoothing:antialiased;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.stage{width:min(100vw,calc(100vh*(1116/558)));aspect-ratio:1116/558;position:relative;overflow:hidden;background:#F6DF35;}
.wrap{width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:6% 14%;gap:.42em;}
.big-num{font-size:3.3em;font-weight:700;color:#0E0C1C;line-height:1;will-change:opacity,transform;}
.sub-label{font-size:.72em;color:rgba(14,12,28,.45);}
.rows{width:100%;display:flex;flex-direction:column;gap:.3em;margin-top:.4em;}
.row{display:flex;align-items:center;justify-content:space-between;background:#F9F4EC;padding:.44em .7em;border-radius:.44em;box-shadow:0 2px 12px rgba(14,12,28,.07);will-change:opacity,transform;}
.rl{font-size:.64em;color:rgba(14,12,28,.55);}
.rv{font-size:.64em;font-weight:700;}
.rv-k{color:#0E0C1C;}
.rv-o{color:#D15A00;}
</style>
</head>
<body>
<div class="stage" id="stage">
  <div class="wrap">
    <div class="big-num" id="num">0 €</div>
    <div class="sub-label" id="sub">Steuer-Nachzahlung</div>
    <div class="rows">
      <div class="row" id="r0"><span class="rl">Vorauszahlungen geleistet</span><span class="rv rv-k">3.200 €</span></div>
      <div class="row" id="r1"><span class="rl">Tatsächliche Steuerlast</span><span class="rv rv-o">54.000 €</span></div>
    </div>
  </div>
</div>
<script>
const stage=document.getElementById("stage");
function sf(){const w=stage.offsetWidth,h=stage.offsetHeight;stage.style.fontSize=Math.max(Math.min(Math.min(w/28,h/14),22),9)+"px";}
new ResizeObserver(sf).observe(stage);sf();
const num=document.getElementById("num"),sub=document.getElementById("sub");
const r0=document.getElementById("r0"),r1=document.getElementById("r1");
const DO=500,ease=t=>t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;
// count-up with optional done-callback
function cu(el,target,dur,cb){
  const t0=Date.now();
  (function tick(){
    const p=Math.min((Date.now()-t0)/dur,1);
    el.textContent=Math.round(ease(p)*target).toLocaleString("de-DE")+" €";
    if(p<1)requestAnimationFrame(tick);
    else if(cb)cb();
  })();
}
function show(){
  // reset
  num.textContent="0 €";
  num.style.transition="none";num.style.opacity="0";num.style.transform="translateY(.3em)";
  sub.style.transition="none";sub.style.opacity="0";
  [r0,r1].forEach(r=>{r.style.transition="none";r.style.opacity="0";r.style.transform="translateY(.32em)";});
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    // 1. number appears and counts up
    num.style.transition="opacity .8s ease,transform .8s cubic-bezier(.4,0,.2,1)";
    num.style.opacity="1";num.style.transform="translateY(0)";
    setTimeout(()=>cu(num,50800,1900,null),80);
    // 2. subtitle
    setTimeout(()=>{sub.style.transition="opacity .5s ease";sub.style.opacity="1";},400);
    // 3. rows appear AFTER count-up finishes (~2000ms)
    setTimeout(()=>{r0.style.transition="opacity .5s ease,transform .5s cubic-bezier(.4,0,.2,1)";r0.style.opacity="1";r0.style.transform="translateY(0)";},2100);
    setTimeout(()=>{r1.style.transition="opacity .5s ease,transform .5s cubic-bezier(.4,0,.2,1)";r1.style.opacity="1";r1.style.transform="translateY(0)";},2320);
    // 4. hold, then fade all (number was already at final value, stays until fade)
    const HOLD=2400;
    setTimeout(()=>{
      [num,sub,r0,r1].forEach(e=>{e.style.transition=`opacity ${DO}ms ease`;e.style.opacity="0";});
      setTimeout(show,DO+100);
    },2320+500+HOLD);
  }));
}
setTimeout(show,250);
</script>
</body>
</html>
