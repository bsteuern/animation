<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#C531A4;font-family:"DM Sans",sans-serif;-webkit-font-smoothing:antialiased;display:flex;align-items:center;justify-content:center;overflow:hidden}
.stage{width:100%;height:100%;position:relative;overflow:hidden;background:transparent;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center}
.card{background:#F9F4EC;border-radius:.65em;width:min(92%,23em);box-shadow:0 .4em 2em rgba(0,0,0,.18);overflow:hidden;opacity:0;transform:translateY(.4em);transition:opacity .65s cubic-bezier(.4,0,.2,1),transform .65s cubic-bezier(.16,1,.3,1)}
.card-h{background:#C531A4;padding:.6em .9em;display:flex;justify-content:space-between;align-items:center}
.ch-t{font-size:.66em;font-weight:700;color:#F9F4EC}
.ch-s{font-size:.54em;font-weight:600;background:rgba(249,244,236,.2);color:#F9F4EC;padding:.14em .5em;border-radius:20px}
/* Horizontal timeline */
.timeline{padding:.55em .9em .65em;position:relative;overflow:visible}
/* Month labels — one row above the events, evenly spaced */
.t-months{display:flex;justify-content:space-between;margin-bottom:.48em}
.tm{font-size:.5em;color:rgba(14,12,28,.28);font-weight:500}
/* Events container: overflow visible so edge cards aren't clipped */
.events{position:relative;height:8em;overflow:visible}
/* Axis line at 50% */
.events::after{content:"";position:absolute;left:0;right:0;top:50%;height:2px;background:rgba(14,12,28,.1);transform:translateY(-50%)}
/* Progress line */
.t-progress{position:absolute;left:0;top:50%;height:2px;width:0;background:#C531A4;transform:translateY(-50%);z-index:1;transition:width 1.4s cubic-bezier(.4,0,.2,1)}
.event{position:absolute;display:flex;align-items:center;opacity:0;transition:opacity .4s ease;z-index:2}
.event.above{flex-direction:column-reverse;bottom:calc(50% - .35em);transform:translateX(-50%)}
.event.below{flex-direction:column;top:calc(50% - .35em);transform:translateX(-50%)}
/* First and last events: pin card to edge so it stays in bounds */
.event.edge-l{transform:translateX(0)}
.event.edge-r{transform:translateX(-100%)}
.ev-dot{width:.7em;height:.7em;border-radius:50%;flex-shrink:0;transform:scale(0);transition:transform .38s cubic-bezier(.34,1.6,.64,1)}
.ev-dot.pop{transform:scale(1)}
.ev-stem{width:1.5px;background:rgba(14,12,28,.15);flex-shrink:0}
.ev-card{background:rgba(197,49,164,.08);border:1px solid rgba(197,49,164,.2);border-radius:.38em;padding:.28em .52em;white-space:nowrap}
.ev-t{font-size:.55em;font-weight:700;color:#0E0C1C}
.ev-s{font-size:.48em;color:rgba(14,12,28,.42);margin-top:.03em}
/* Summary */
.sum{display:flex;justify-content:space-between;align-items:center;padding:.38em .9em;background:rgba(197,49,164,.06);border-top:1px solid rgba(14,12,28,.07);opacity:0;transition:opacity .4s}
.su-l{font-size:.58em;color:rgba(14,12,28,.42)}
.su-r{font-size:.64em;font-weight:700;color:#C531A4}

.bg-svg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
</style></head><body>

<div class="stage" id="stage">
  <div class="card" id="card">
    <div class="card-h"><span class="ch-t">Steuerfristen-Radar 2024</span><span class="ch-s">b'steuern</span></div>
    <div class="timeline">
      <div class="t-months">
        <span class="tm">Jan</span><span class="tm">Mrz</span><span class="tm">Mai</span><span class="tm">Jul</span><span class="tm">Sep</span><span class="tm">Dez</span>
      </div>
      <div class="events" id="evs">
        <div class="t-progress" id="tp"></div>
        <!-- Events injected by JS -->
      </div>
    </div>
    <div class="sum" id="sum"><span class="su-l">Alle Fristen im Blick</span><span class="su-r">Keine Nachzahlung ✓</span></div>
  </div>
</div>
<script>
const stage=document.getElementById("stage");
function sf(){const w=stage.offsetWidth,h=stage.offsetHeight;document.documentElement.style.fontSize=Math.max(Math.min(Math.min(w/28,h/14),22),9)+"px"}
new ResizeObserver(sf).observe(stage);sf();
const card=document.getElementById("card"),tp=document.getElementById("tp"),evs=document.getElementById("evs"),sum=document.getElementById("sum");
const H=4800,DO=600;
// 6 events, evenly spaced 4%→90% (step ~17%), alternating above/below
const evData=[
  {pos:.04, above:true, t:"USt Jan",    s:"10. Jan",col:"#C531A4"},
  {pos:.21, above:false,t:"Vorauszhlg.",s:"10. Apr",col:"rgba(14,12,28,.38)"},
  {pos:.38, above:true, t:"USt Mai",    s:"10. Mai",col:"#C531A4"},
  {pos:.55, above:false,t:"Vorauszhlg.",s:"10. Jul",col:"rgba(14,12,28,.38)"},
  {pos:.72, above:true, t:"ESt-Erkl.",  s:"31. Jul",col:"#C531A4"},
  {pos:.90, above:false,t:"Vorauszhlg.",s:"10. Sep",col:"rgba(14,12,28,.38)"},
];
function buildEvents(){
  evs.innerHTML="";
  const prog=document.createElement("div");prog.className="t-progress";prog.id="tpinner";evs.appendChild(prog);
  evData.forEach((e,i)=>{
    const el=document.createElement("div");
    el.className="event "+(e.above?"above":"below");
    el.id="ev"+i;el.style.left=(e.pos*100)+"%";
    const stemH=e.above?"1.3em":"0.9em";
    el.innerHTML=`<div class="ev-dot" id="ed${i}" style="background:${e.col}"></div><div class="ev-stem" style="height:${stemH}"></div><div class="ev-card"><div class="ev-t">${e.t}</div><div class="ev-s">${e.s}</div></div>`;
    evs.appendChild(el);
  });
}
function run(){
  card.style.transition="none";card.style.opacity="0";card.style.transform="translateY(.4em)";tp.style.transition="none";tp.style.width="0";sum.style.transition="none";sum.style.opacity="0";
  buildEvents();
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    card.style.transition="opacity .65s cubic-bezier(.4,0,.2,1),transform .65s cubic-bezier(.16,1,.3,1)";card.style.opacity="1";card.style.transform="none";
    setTimeout(()=>{tp.style.transition="width 1.4s cubic-bezier(.4,0,.2,1)";tp.style.width="100%"},400);
    evData.forEach((_,i)=>{
      const delay=500+i*280;
      setTimeout(()=>{
        const el=document.getElementById("ev"+i),dot=document.getElementById("ed"+i);
        el.style.transition="opacity .4s ease,transform .42s cubic-bezier(.34,1.4,.64,1)";el.style.opacity="1";
        setTimeout(()=>dot&&dot.classList.add("pop"),200);
      },delay);
    });
    setTimeout(()=>{sum.style.transition="opacity .4s";sum.style.opacity="1"},500+evData.length*280+100);
    setTimeout(()=>{card.style.transition=`opacity ${DO}ms ease`;card.style.opacity="0";setTimeout(run,DO+150)},500+evData.length*280+H);
  }));
}
setTimeout(run,250);
</script></body></html>
