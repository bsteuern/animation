<!DOCTYPE html><html lang="de"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>01C</title><link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet"><style>*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#6A6872;display:flex;align-items:center;justify-content:center}
.stage{position:relative;width:100%;aspect-ratio:1116/558;max-height:100vh;background:#6A6872;overflow:hidden;font-family:'DM Sans',sans-serif;color:#0E0C1C}
.f{opacity:0;transition:opacity .5s ease}
.f.in{opacity:1}
.u{opacity:0;transform:translateY(8px);transition:opacity .45s ease,transform .45s cubic-bezier(.25,.46,.45,.94)}
.u.in{opacity:1;transform:translateY(0)}
.card{
  background:#F9F4EC;
  border-radius:20px;
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:52%;
  /* height is auto – expands to fit content */
}
.ch{
  padding:.85em 1.4em;
  border-bottom:1px solid rgba(202,202,205,.4);
}
.ch-t{font-size:.75em;font-weight:600;color:#0E0C1C}
.ch-s{font-size:.52em;color:#CACACD;margin-top:.1em}
.level{
  padding:.62em 1.4em;
  border-bottom:1px solid rgba(202,202,205,.18);
  display:flex;
  align-items:center;
  gap:.65em;
}
.level:last-child{border-bottom:none}
.lv-bar{width:3px;border-radius:2px;flex-shrink:0;align-self:stretch;min-height:2.2em}
.lv-name{font-size:.65em;font-weight:500;color:#0E0C1C}
.lv-sub{font-size:.5em;color:#CACACD;margin-top:.1em}
.lv-tag{
  margin-left:auto;
  flex-shrink:0;
  display:inline-block;
  border-radius:100px;
  padding:.13em .65em;
  font-size:.5em;
  font-weight:500;
  white-space:nowrap;
}
</style>
</head><body><div class="stage" id="stage">
<div class="card f" id="card">
  <div class="ch">
    <div class="ch-t">Mehrstufige Holdingstruktur</div>
    <div class="ch-s">Vier Konzernebenen im Überblick</div>
  </div>
  <div class="level u" id="e0" style="padding-left:1.4em">
    <div class="lv-bar" style="background:#0E0C1C"></div>
    <div>
      <div class="lv-name">Konzernebene</div>
      <div class="lv-sub">Konsolidierter Abschluss · § 290 HGB</div>
    </div>
    <span class="lv-tag" style="background:#0E0C1C;color:#F9F4EC">Ebene 1</span>
  </div>
  <div class="level u" id="e1" style="padding-left:2.4em">
    <div class="lv-bar" style="background:#CACACD"></div>
    <div>
      <div class="lv-name">Holdinggesellschaft</div>
      <div class="lv-sub">Muttergesellschaft · Organschaft</div>
    </div>
    <span class="lv-tag" style="background:rgba(202,202,205,.3);color:#0E0C1C">Ebene 2</span>
  </div>
  <div class="level u" id="e2" style="padding-left:3.4em">
    <div class="lv-bar" style="background:#CACACD;opacity:.6"></div>
    <div>
      <div class="lv-name">Tochtergesellschaft</div>
      <div class="lv-sub">Betriebsgesellschaft · § 8b KStG</div>
    </div>
    <span class="lv-tag" style="background:rgba(202,202,205,.3);color:#0E0C1C">Ebene 3</span>
  </div>
  <div class="level u" id="e3" style="padding-left:4.4em">
    <div class="lv-bar" style="background:#CACACD;opacity:.35"></div>
    <div>
      <div class="lv-name">Operative Einheit</div>
      <div class="lv-sub">Enkelin GmbH · Betriebsstätte</div>
    </div>
    <span class="lv-tag" style="background:rgba(202,202,205,.3);color:#0E0C1C">Ebene 4</span>
  </div>
</div></div>
<script>const S=document.getElementById('stage');
const rz=()=>{const w=S.offsetWidth,h=S.offsetHeight;S.style.fontSize=Math.max(Math.min(Math.min(w/28,h/14),22),9)+'px'};
new ResizeObserver(rz).observe(S);rz();
const wait=ms=>new Promise(r=>setTimeout(r,ms));
const $=id=>document.getElementById(id);
const show=id=>{const e=$(id);if(e)e.classList.add('in')};
const hide=id=>{const e=$(id);if(e)e.classList.remove('in')};
async function run(){
  hide('card'); ['e0','e1','e2','e3'].forEach(hide);
  await wait(300); show('card'); await wait(350);
  for(const id of ['e0','e1','e2','e3']){ show(id); await wait(350); }
  await wait(4500); run();
}
run();</script></body></html>
