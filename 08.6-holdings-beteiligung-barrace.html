<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#6A6872;font-family:"DM Sans",sans-serif;-webkit-font-smoothing:antialiased;display:flex;align-items:center;justify-content:center;overflow:hidden}
.stage{width:100%;height:100%;position:relative;overflow:hidden;background:transparent;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center}
.card{background:#F9F4EC;border-radius:.65em;width:min(92%,22em);box-shadow:0 .45em 2.2em rgba(0,0,0,.2);overflow:hidden;opacity:0;transform:translateY(.4em);transition:opacity .65s cubic-bezier(.4,0,.2,1),transform .65s cubic-bezier(.16,1,.3,1)}
.card-h{background:#6A6872;padding:.6em .9em;display:flex;justify-content:space-between;align-items:center}
.ch-t{font-size:.66em;font-weight:700;color:#F9F4EC}
.ch-s{font-size:.52em;font-weight:600;background:rgba(249,244,236,.18);color:#F9F4EC;padding:.14em .5em;border-radius:20px}
/* Bar race */
.bars{padding:.5em .9em .6em;display:flex;flex-direction:column;gap:.38em}
.bar-row{display:flex;align-items:center;gap:.5em}
.br-lbl{font-size:.56em;font-weight:600;color:#0E0C1C;width:8.5em;flex-shrink:0;text-align:right}
.br-track{flex:1;height:.65em;background:rgba(14,12,28,.07);border-radius:.33em;overflow:hidden}
.br-fill{height:100%;border-radius:.33em;transform-origin:left;transform:scaleX(0);transition:transform .95s cubic-bezier(.4,0,.2,1)}
.br-val{font-size:.56em;font-weight:700;color:#0E0C1C;width:3em;flex-shrink:0}
/* Footer comparison */
.foot{background:rgba(14,12,28,.04);border-top:1px solid rgba(14,12,28,.07);padding:.4em .9em;display:flex;justify-content:space-between;align-items:center;opacity:0;transition:opacity .4s}
.f-l{font-size:.56em;color:rgba(14,12,28,.42)}
.f-r{font-size:.66em;font-weight:700;color:#0E0C1C}

.bg-svg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
</style></head><body>

<div class="stage" id="stage">
  <div class="card" id="card">
    <div class="card-h"><span class="ch-t">Effektive Steuerlast im Vergleich</span><span class="ch-s">Holding vs. Privat</span></div>
    <div class="bars">
      <div class="bar-row"><span class="br-lbl">Privat (KapErtrSt)</span><div class="br-track"><div class="br-fill" id="b0" style="background:rgba(14,12,28,.35);width:100%"></div></div><span class="br-val" id="v0">25 %</span></div>
      <div class="bar-row"><span class="br-lbl">Privat + Soli</span><div class="br-track"><div class="br-fill" id="b1" style="background:rgba(14,12,28,.28);width:100%"></div></div><span class="br-val" id="v1">26,4 %</span></div>
      <div class="bar-row"><span class="br-lbl">Dividende Holding</span><div class="br-track"><div class="br-fill" id="b2" style="background:rgba(202,202,205,.8);width:14%"></div></div><span class="br-val" id="v2">3,5 %</span></div>
      <div class="bar-row"><span class="br-lbl">Veräußerung Holding</span><div class="br-track"><div class="br-fill" id="b3" style="background:rgba(202,202,205,.6);width:6%"></div></div><span class="br-val" id="v3">1,5 %</span></div>
    </div>
    <div class="foot" id="foot"><span class="f-l">Ersparnis durch Holding-Struktur</span><span class="f-r">bis −23,9 Prozentpunkte</span></div>
  </div>
</div>
<script>
const stage=document.getElementById("stage");
function sf(){const w=stage.offsetWidth,h=stage.offsetHeight;document.documentElement.style.fontSize=Math.max(Math.min(Math.min(w/28,h/14),22),9)+"px"}
new ResizeObserver(sf).observe(stage);sf();
const card=document.getElementById("card"),foot=document.getElementById("foot");
const bars=[0,1,2,3].map(i=>document.getElementById("b"+i));
const H=4500,DO=600;
function run(){
  card.style.transition="none";card.style.opacity="0";card.style.transform="translateY(.4em)";foot.style.transition="none";foot.style.opacity="0";
  bars.forEach(b=>{b.style.transition="none";b.style.transform="scaleX(0)"});
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    card.style.transition="opacity .65s cubic-bezier(.4,0,.2,1),transform .65s cubic-bezier(.16,1,.3,1)";card.style.opacity="1";card.style.transform="none";
    bars.forEach((b,i)=>setTimeout(()=>{b.style.transition="transform .95s cubic-bezier(.4,0,.2,1)";b.style.transform="scaleX(1)"},300+i*320));
    setTimeout(()=>{foot.style.transition="opacity .4s";foot.style.opacity="1"},300+4*320);
    setTimeout(()=>{card.style.transition=`opacity ${DO}ms ease`;card.style.opacity="0";setTimeout(run,DO+150)},300+4*320+H);
  }));
}
setTimeout(run,250);
</script></body></html>
