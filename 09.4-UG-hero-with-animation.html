    opacity:0; transition:opacity .35s ease;
  }
  .row:last-child { border-bottom:none; }
  .row.in { opacity:1; }

  .row-t { font-size:.65em; font-weight:500; color:#0E0C1C; }

  .dot {
    width:.75em; height:.75em; border-radius:50%;

    transition:background .4s cubic-bezier(.34,1.56,.64,1), transform .4s cubic-bezier(.34,1.56,.64,1);

      <div class="pad">
        <div class="eye">UG · Formale Pflichten</div>
        <div class="row" id="r0"><span class="row-t">Buchführung</span><div class="dot" id="dd0"></div></div>
        <div class="row" id="r1"><span class="row-t">Fristen</span><div class="dot" id="dd1"></div></div>
        <div class="row" id="r2"><span class="row-t">Finanzamt</span><div class="dot" id="dd2"></div></div>
        <div class="row" id="r3"><span class="row-t">Jahresabschluss</span><div class="dot" id="dd3"></div></div>
      </div>
    </div>
  </div>
</div>

<script>
  const stage = document.getElementById('stage');
  const resize = () => {
    const w = stage.offsetWidth;
    stage.style.fontSize = Math.max(Math.min(w / 20, 26), 8) + 'px';
  };
  new ResizeObserver(resize).observe(stage);
  resize();

  const wait = ms => new Promise(r => setTimeout(r, ms));
  const $ = id => document.getElementById(id);

  async function run() {
    const card = $('card');
    card.classList.remove('in');
    [0,1,2,3].forEach(i => {
      $('r'+i)?.classList.remove('in');
      $('dd'+i)?.classList.remove('on');
    });
    await wait(300);
    card.classList.add('in');
    await wait(400);
    for (let i = 0; i < 4; i++) {
      $('r'+i).classList.add('in'); await wait(300);
      $('dd'+i).classList.add('on'); await wait(350);
    }
    await wait(4000);
    run();
  }
  run();
</script>
</body>
</html>
