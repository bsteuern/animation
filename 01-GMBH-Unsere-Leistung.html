<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#1DB8C6;font-family:"DM Sans",sans-serif;-webkit-font-smoothing:antialiased;display:flex;align-items:center;justify-content:center;overflow:hidden}
.stage{width:100%;height:100%;position:relative;overflow:hidden;background:transparent;display:flex;align-items:center;justify-content:center}
.stage-bg{position:absolute;inset:0;width:100%;height:100%}
.doc{background:#fff;border-radius:.55em;box-shadow:0 .5em 2.5em rgba(0,0,0,.15);width:24.48em;overflow:hidden;opacity:0;transform:translateY(.5em);transition:opacity .6s cubic-bezier(.4,0,.2,1),transform .6s cubic-bezier(.16,1,.3,1);position:relative}
.doc-top{background:#162D3E;padding:.65em 1em;display:flex;align-items:center;justify-content:space-between}
.doc-title{font-size:.72em;font-weight:600;color:#F9F4EC}
.doc-badge{font-size:.55em;font-weight:600;background:rgba(29,184,198,.2);color:#1DB8C6;padding:.18em .55em;border-radius:20px}
.doc-body{padding:.55em 1em .7em;display:flex;flex-direction:column;gap:0}
.line{display:flex;align-items:center;justify-content:space-between;padding:.4em 0;border-bottom:1px solid rgba(22,45,62,.06);opacity:0;transform:translateX(-.5em);transition:opacity .38s ease,transform .38s ease}
.line:last-child{border:none}
.ll{font-size:.62em;color:#8a9fae;flex:0 0 42%;min-width:0}
.lr{font-size:.63em;font-weight:600;color:#162D3E;flex:1;text-align:left}
.chk{width:1em;height:1em;border-radius:50%;background:#1DB8C6;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-left:.4em;opacity:0;transform:scale(0);transition:opacity .3s ease,transform .35s cubic-bezier(.34,1.5,.64,1)}
.chk svg{width:55%;height:55%}
.stamp{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-18deg) scale(0);font-size:1.4em;font-weight:700;color:#1DB8C6;border:3px solid #1DB8C6;border-radius:.25em;padding:.15em .55em;letter-spacing:.12em;opacity:0;transition:opacity .4s ease,transform .5s cubic-bezier(.34,1.4,.64,1);white-space:nowrap}
</style></head><body>
<div class="stage" id="stage">
  <svg class="stage-bg" viewBox="0 0 316 316" preserveAspectRatio="xMidYMid slice" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect width="157.602" height="157.758" transform="matrix(-4.37114e-08 1 1 4.28323e-08 0 157.758)" fill="#00A1AA"/>
    <path d="M157.758 315.36C137.041 315.36 116.527 311.283 97.3866 303.363C78.2466 295.443 60.8554 283.834 46.2063 269.199C31.5571 254.564 19.9367 237.191 12.0086 218.069C4.08053 198.948 -1.81025e-06 178.454 0 157.758L157.758 157.758L157.758 315.36Z" fill="#00C0CA"/>
    <rect width="157.602" height="157.758" transform="matrix(-4.37114e-08 1 1 4.28323e-08 0 0)" fill="#00A1AA"/>
    <path d="M157.758 157.602C137.041 157.602 116.527 153.525 97.3866 145.605C78.2466 137.685 60.8554 126.076 46.2063 111.441C31.5571 96.8066 19.9367 79.4327 12.0086 60.3116C4.08053 41.1905 -1.81025e-06 20.6966 0 0L157.758 1.63957e-05L157.758 157.602Z" fill="#00C0CA"/>
    <rect width="157.602" height="157.758" transform="matrix(1 1.74846e-07 1.73966e-07 -1 157.758 315.516)" fill="#00A1AA"/>
    <path d="M315.36 157.758C315.36 178.475 311.283 198.989 303.363 218.129C295.443 237.269 283.834 254.66 269.199 269.309C254.564 283.959 237.191 295.579 218.069 303.507C198.948 311.435 178.454 315.516 157.758 315.516L157.758 157.758L315.36 157.758Z" fill="#00C0CA"/>
    <rect width="157.602" height="157.758" transform="matrix(1 1.74846e-07 1.73966e-07 -1 157.758 157.758)" fill="#00A1AA"/>
    <path d="M315.36 -0.000211697C315.36 20.7169 311.283 41.2311 303.363 60.3712C295.443 79.5113 283.834 96.9024 269.199 111.552C254.564 126.201 237.191 137.821 218.069 145.749C198.948 153.677 178.454 157.758 157.758 157.758L157.758 -0.000239253L315.36 -0.000211697Z" fill="#00C0CA"/>
  </svg>
  <div class="doc" id="doc">
    <div class="doc-top"><span class="doc-title">Jahresabschluss 2024</span><span class="doc-badge">Handelsgesetzbuch</span></div>
    <div class="doc-body">
      <div class="line" id="l0"><span class="ll">Bilanz</span><span class="lr" id="v0">482.300 € = 482.300 €</span><div class="chk" id="c0"><svg viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div></div>
      <div class="line" id="l1"><span class="ll">Gewinn- &amp; Verlustrechnung</span><span class="lr">+ 84.200 €</span><div class="chk" id="c1"><svg viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div></div>
      <div class="line" id="l2"><span class="ll">Anhang §§ 284 ff. HGB</span><span class="lr">Vollständig</span><div class="chk" id="c2"><svg viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div></div>
      <div class="line" id="l3"><span class="ll">Bundesanzeiger</span><span class="lr">Fristgerecht</span><div class="chk" id="c3"><svg viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div></div>
    </div>
    <div class="stamp" id="stamp">FERTIG</div>
  </div>
</div>
<script>
const stage=document.getElementById("stage");
function sf(){const w=stage.offsetWidth,h=stage.offsetHeight;document.documentElement.style.fontSize=Math.max(Math.min(Math.min(w/28,h/14),22),9)+"px"}
new ResizeObserver(sf).observe(stage);sf();
const doc=document.getElementById("doc"),stamp=document.getElementById("stamp");
const lines=[0,1,2,3].map(i=>document.getElementById("l"+i));
const chks=[0,1,2,3].map(i=>document.getElementById("c"+i));
const H=3800,DO=550;
function run(){
  doc.style.transition="none";doc.style.opacity="0";doc.style.transform="translateY(.5em)";
  lines.forEach(l=>{l.style.transition="none";l.style.opacity="0";l.style.transform="translateX(-.5em)"});
  chks.forEach(c=>{c.style.transition="none";c.style.opacity="0";c.style.transform="scale(0)"});
  stamp.style.transition="none";stamp.style.opacity="0";stamp.style.transform="translate(-50%,-50%) rotate(-18deg) scale(0)";
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    doc.style.transition="opacity .6s cubic-bezier(.4,0,.2,1),transform .6s cubic-bezier(.16,1,.3,1)";
    doc.style.opacity="1";doc.style.transform="translateY(0)";
    lines.forEach((l,i)=>setTimeout(()=>{l.style.transition="opacity .4s ease,transform .4s ease";l.style.opacity="1";l.style.transform="none"},400+i*280));
    chks.forEach((c,i)=>setTimeout(()=>{c.style.transition="opacity .3s ease,transform .35s cubic-bezier(.34,1.5,.64,1)";c.style.opacity="1";c.style.transform="scale(1)"},700+i*280));
    setTimeout(()=>{stamp.style.transition="opacity .4s ease,transform .5s cubic-bezier(.34,1.4,.64,1)";stamp.style.opacity="1";stamp.style.transform="translate(-50%,-50%) rotate(-18deg) scale(1)"},2300);
    setTimeout(()=>{const t=`opacity ${DO}ms ease`;[doc,stamp].forEach(el=>{el.style.transition=t;el.style.opacity="0"});setTimeout(run,DO+150)},2400+H)}))
}
setTimeout(run,250);
</script></body></html>
