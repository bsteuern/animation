  .anim-stage {
    position:absolute;
    top:67%;
    left:50%;
    transform:translateX(-50%);
    width:80%;
    height:27%;
    font-family:'DM Sans',sans-serif;
  }

  @keyframes spr {
    0%   { opacity:0; transform:translate(-50%,-50%) scale(.88); }
    60%  { transform:translate(-50%,-50%) scale(1.03); }
    100% { opacity:1; transform:translate(-50%,-50%) scale(1); }
  }
  @keyframes fu { from { opacity:0; transform:translateY(7px); } to { opacity:1; transform:translateY(0); } }

  .card {
    position:absolute;
    top:50%; left:50%;
    transform:translate(-50%,-50%) scale(.88);
    width:100%;
    background:#F9F4EC;
    border-radius:1.1em;
    box-shadow:0 .5em 2.5em rgba(0,0,0,.18), 0 .1em .4em rgba(0,0,0,.08);
    opacity:0; overflow:hidden;
  }
  .card.in { animation:spr .55s cubic-bezier(.25,.46,.45,.94) forwards; }

  .pad { padding:.9em .9em .85em; }
  .eye {
    font-size:.52em; font-weight:500; color:#C531A4;
    letter-spacing:.08em; text-transform:uppercase;
    animation:fu .4s ease .55s both; margin-bottom:.55em;
  }

  .state { display:flex; flex-direction:column; gap:.35em; }

  .row { display:flex; align-items:center; gap:.5em; }

  .icon {
    width:1.3em; height:1.3em; border-radius:.35em;
    display:flex; align-items:center; justify-content:center;
    font-size:.6em; flex-shrink:0;
    transition:background .4s ease, color .4s ease;
  }
  .icon.off { background:rgba(197,49,164,.12); color:#C531A4; }
  .icon.on  { background:#C531A4; color:#F9F4EC; }

  .row-t {
    font-size:.65em; font-weight:500; color:#0E0C1C;
    position:relative; display:inline-block;
  }
  .row-t .strike {
    position:absolute; top:50%; left:0;
    height:1.5px; background:#C531A4;
    width:0; transition:width .5s ease;
  }
  .row.done .strike { width:100%; }
</style>
</head>
<body>
<div class="hero">
  <div class="anim-stage" id="stage">
    <div class="card" id="card">
      <div class="pad">
        <div class="eye">Selbständige · b'steuern</div>
        <div class="state">
          <div class="row" id="r0">
            <div class="icon off" id="ic0">?</div>
            <span class="row-t">Bürokratie<div class="strike" id="st0"></div></span>
          </div>
          <div class="row" id="r1">
            <div class="icon off" id="ic1">?</div>
            <span class="row-t">Unklar<div class="strike" id="st1"></div></span>
          </div>
          <div class="row" id="r2">
            <div class="icon off" id="ic2">?</div>
            <span class="row-t">Überfordert<div class="strike" id="st2"></div></span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  const stage = document.getElementById('stage');
  const resize = () => {
    const w = stage.offsetWidth;
    stage.style.fontSize = Math.max(Math.min(w / 20, 26), 8) + 'px';
  };
  new ResizeObserver(resize).observe(stage);
  resize();

  const wait = ms => new Promise(r => setTimeout(r, ms));
  const $ = id => document.getElementById(id);

  function reset() {
    [0,1,2].forEach(i => {
      const ic = $('ic'+i), st = $('st'+i), r = $('r'+i);
      if (ic) { ic.className = 'icon off'; ic.textContent = '?'; }
      if (st) st.style.width = '0';
      if (r)  r.classList.remove('done');
    });
  }

  async function run() {
    const card = $('card');
    card.classList.remove('in');
    reset();
    await wait(300);
    card.classList.add('in');
    await wait(700);
    for (let i = 0; i < 3; i++) {
      await wait(600);
      $('st'+i).style.width = '100%';
      $('r'+i).classList.add('done');
      await wait(400);
      const ic = $('ic'+i);
      ic.className = 'icon on';
      ic.textContent = '✓';
    }
    await wait(4000);
    run();
  }
  run();
</script>
