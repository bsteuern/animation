<!DOCTYPE html><html lang="de"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>02B</title><link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet"><style>*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#6A6872;display:flex;align-items:center;justify-content:center}
.stage{position:relative;width:100%;aspect-ratio:1116/319;max-height:100vh;background:#6A6872;overflow:hidden;font-family:'DM Sans',sans-serif;color:#0E0C1C}
.f{opacity:0;transition:opacity .5s ease}
.f.in{opacity:1}
.u{opacity:0;transform:translateY(8px);transition:opacity .45s ease,transform .45s cubic-bezier(.25,.46,.45,.94)}
.u.in{opacity:1;transform:translateY(0)}
.card{
  background:#F9F4EC;
  border-radius:20px;
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:58%;
  overflow:hidden;
  /* height auto – no bottom constraint */
}
.ch{
  padding:.85em 1.4em;
  border-bottom:1px solid rgba(202,202,205,.4);
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.ch-t{font-size:.73em;font-weight:600;color:#0E0C1C}
.tag{
  display:inline-block;
  background:#0E0C1C;
  color:#F9F4EC;
  border-radius:100px;
  padding:.15em .7em;
  font-size:.52em;
  font-weight:500;
}
.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:.68em 1.4em;
  border-bottom:1px solid rgba(202,202,205,.2);
}
.rl{font-size:.63em;color:#0E0C1C}
.rv{font-size:.65em;font-weight:600;color:#0E0C1C}
.rv-dim{color:#CACACD}
/* Total row is the last element – dark background, no extra spacing below */
.total{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:.9em 1.4em;
  background:#0E0C1C;
  /* border-radius on bottom corners to follow card */
  border-radius:0 0 20px 20px;
}
.tl{font-size:.62em;font-weight:500;color:#CACACD}
.tv{font-size:.68em;font-weight:700;color:#F9F4EC}
</style>
</head><body><div class="stage" id="stage">
<div class="card f" id="card">
  <div class="ch">
    <span class="ch-t">Dividendenberechnung · § 8b KStG</span>
    <span class="tag">Schachtelprivileg</span>
  </div>
  <div class="row u" id="r0">
    <span class="rl">Brutto-Dividende</span>
    <span class="rv">€ 500.000</span>
  </div>
  <div class="row u" id="r1">
    <span class="rl">Steuerfreistellung 95 %</span>
    <span class="rv rv-dim">– € 475.000</span>
  </div>
  <div class="row u" id="r2">
    <span class="rl">Pauschalansatz 5 %</span>
    <span class="rv rv-dim">€ 25.000</span>
  </div>
  <div class="row u" id="r3">
    <span class="rl">Körperschaftsteuer 15 %</span>
    <span class="rv rv-dim">€ 3.750</span>
  </div>
  <div class="total u" id="tot">
    <span class="tl">Effektive Steuerbelastung</span>
    <span class="tv">€ 3.750 <span style="font-weight:400;color:#CACACD;font-size:.85em">(0,75 %)</span></span>
  </div>
</div></div>
<script>const S=document.getElementById('stage');
const rz=()=>{const w=S.offsetWidth,h=S.offsetHeight;S.style.fontSize=Math.max(Math.min(Math.min(w/28,h/14),22),9)+'px'};
new ResizeObserver(rz).observe(S);rz();
const wait=ms=>new Promise(r=>setTimeout(r,ms));
const $=id=>document.getElementById(id);
const show=id=>{const e=$(id);if(e)e.classList.add('in')};
const hide=id=>{const e=$(id);if(e)e.classList.remove('in')};
async function run(){
  hide('card'); ['r0','r1','r2','r3','tot'].forEach(hide);
  await wait(300); show('card'); await wait(400);
  for(const id of ['r0','r1','r2','r3']){ show(id); await wait(280); }
  await wait(300); show('tot'); await wait(4800); run();
}
run();</script></body></html>
