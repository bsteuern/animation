<!DOCTYPE html><html lang="de"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>08_2</title><link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#6A6872}
.stage{
  position:relative;
  width:100%;
  aspect-ratio:1116/558;
  max-height:100%;
  background:#6A6872;
  overflow:hidden;
  font-family:'DM Sans',sans-serif;
  color:#0E0C1C;
}
.f{opacity:0;transition:opacity .55s ease}
.f.in{opacity:1}
.u{opacity:0;transform:translateY(7px);transition:opacity .5s ease,transform .5s cubic-bezier(.25,.46,.45,.94)}
.u.in{opacity:1;transform:translateY(0)}
.card{
  background:#F9F4EC;
  border-radius:18px;
  position:absolute;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  width:62%;
  overflow:hidden;
}
.ch{
  padding:.75em 1.2em;
  border-bottom:1px solid rgba(202,202,205,.4);
  display:flex;justify-content:space-between;align-items:center;
  gap:.5em;
}
.ch-t{font-size:.8em;font-weight:600;color:#0E0C1C;white-space:nowrap}
.tag{
  flex-shrink:0;
  background:#0E0C1C;color:#F9F4EC;
  border-radius:100px;
  padding:.14em .65em;
  font-size:.58em;font-weight:500;
  white-space:nowrap;
}
.row{
  display:flex;justify-content:space-between;align-items:center;
  padding:.6em 1.2em;
  border-bottom:1px solid rgba(202,202,205,.2);
  gap:.5em;
}
.rl{font-size:.7em;color:#0E0C1C;flex:1;min-width:0}
.rv{font-size:.72em;font-weight:600;color:#CACACD;white-space:nowrap;flex-shrink:0}
.rv-dark{color:#0E0C1C}
.foot{
  padding:.75em 1.2em;
  background:#0E0C1C;
  display:flex;justify-content:space-between;align-items:center;
  border-radius:0 0 18px 18px;
}
.fl{font-size:.62em;font-weight:500;color:#CACACD}
.fv{font-size:.72em;font-weight:700;color:#F9F4EC}
</style>
</head><body>
<div class="stage" id="stage">
<div class="card f" id="card">
  <div class="ch">
    <span class="ch-t">§ 8b KStG · Dividende</span>
    <span class="tag">Schachtelprivileg</span>
  </div>
  <div class="row u" id="r0">
    <span class="rl">Brutto-Dividende</span>
    <span class="rv rv-dark">€ 500.000</span>
  </div>
  <div class="row u" id="r1">
    <span class="rl">Steuerfreistellung 95 %</span>
    <span class="rv">– € 475.000</span>
  </div>
  <div class="row u" id="r2">
    <span class="rl">Pauschalansatz 5 %</span>
    <span class="rv">€ 25.000</span>
  </div>
  <div class="row u" id="r3">
    <span class="rl">KSt 15 % auf 5 %</span>
    <span class="rv">€ 3.750</span>
  </div>
  <div class="foot u" id="foot">
    <span class="fl">Effektive Steuerbelastung</span>
    <span class="fv">0,75 %</span>
  </div>
</div></div>
<script>const S=document.getElementById('stage');
const rz=()=>{
  const w=S.offsetWidth,h=S.offsetHeight;
  S.style.fontSize=Math.max(Math.min(Math.min(w/24,h/12),22),9)+'px';
};
new ResizeObserver(rz).observe(S);rz();
const wait=ms=>new Promise(r=>setTimeout(r,ms));
const $=id=>document.getElementById(id);
const show=id=>{const e=$(id);if(e)e.classList.add('in')};
const hide=id=>{const e=$(id);if(e)e.classList.remove('in')};
async function run(){
  hide('card');['r0','r1','r2','r3','foot'].forEach(hide);
  await wait(300); show('card'); await wait(400);
  for(const id of ['r0','r1','r2','r3']){show(id);await wait(280);}
  await wait(300); show('foot'); await wait(4800); run();
}
run();</script></body></html>
