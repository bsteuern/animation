<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#C531A4;font-family:"DM Sans",sans-serif;-webkit-font-smoothing:antialiased;display:flex;align-items:center;justify-content:center;overflow:hidden}
.stage{width:100%;height:100%;position:relative;overflow:hidden;background:transparent;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center}
.card{background:#F9F4EC;border-radius:.65em;width:min(92%,20em);box-shadow:0 .45em 2.2em rgba(0,0,0,.2);overflow:hidden;opacity:0;transform:translateY(.5em);transition:opacity .6s cubic-bezier(.4,0,.2,1),transform .6s cubic-bezier(.16,1,.3,1)}
.card-h{background:#C531A4;padding:.58em .9em;display:flex;justify-content:space-between;align-items:center}
.ch-t{font-size:.66em;font-weight:700;color:#F9F4EC}
.ch-s{font-size:.52em;font-weight:600;background:rgba(249,244,236,.2);color:#F9F4EC;padding:.14em .5em;border-radius:20px}
/* Form body */
.form{padding:.5em .9em .6em;display:flex;flex-direction:column;gap:.32em}
.field{display:flex;flex-direction:column;gap:.1em;opacity:0;transform:translateX(-.3em);transition:opacity .38s ease,transform .42s cubic-bezier(.16,1,.3,1)}
.field.v{opacity:1;transform:none}
.f-lbl{font-size:.52em;color:rgba(14,12,28,.42);font-weight:500}
.f-input{background:rgba(197,49,164,.05);border:1.5px solid rgba(14,12,28,.12);border-radius:.35em;padding:.3em .55em;display:flex;align-items:center;justify-content:space-between;min-height:1.8em}
.f-val{font-size:.6em;font-weight:600;color:#0E0C1C;font-family:"DM Mono",monospace;overflow:hidden;white-space:nowrap}
.cursor{display:inline-block;width:.5em;height:.8em;background:#C531A4;margin-left:.06em;animation:blink .7s step-end infinite;vertical-align:middle}
@keyframes blink{50%{opacity:0}}
.f-check{width:.95em;height:.95em;border-radius:.22em;border:1.5px solid rgba(14,12,28,.2);display:flex;align-items:center;justify-content:center;flex-shrink:0;opacity:0;transition:background .35s,border-color .35s}
.f-check.ticked{background:#C531A4;border-color:#C531A4;opacity:1}
.f-check svg{width:58%;height:58%}
/* Bottom conclusion */
.submit{border-top:1px solid rgba(14,12,28,.08);padding:.4em .9em;display:flex;align-items:center;justify-content:space-between;opacity:0;transition:opacity .4s;margin-top:.05em;gap:.5em}
.sb-t{font-size:.62em;font-weight:700;color:#0E0C1C}
.sb-badge{font-size:.52em;font-weight:700;background:#C531A4;color:#F9F4EC;border-radius:20px;padding:.18em .6em;white-space:nowrap;flex-shrink:0}

.bg-svg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
</style></head><body>
<svg class="bg-svg" viewBox="0 0 316 316" preserveAspectRatio="xMidYMid slice" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="157.602" height="157.758" transform="matrix(-4.37114e-08 1 1 4.28323e-08 0.000213623 157.602)" fill="#C531A4"/>
<rect width="157.602" height="157.758" transform="matrix(-4.37114e-08 1 1 4.28323e-08 0.000213623 0.00027171)" fill="#C531A4"/>
<rect width="157.602" height="157.758" transform="matrix(1 1.74846e-07 1.73966e-07 -1 157.758 315.516)" fill="#C531A4"/>
<rect width="157.602" height="157.758" transform="matrix(1 1.74846e-07 1.73966e-07 -1 157.758 157.758)" fill="#C531A4"/>
<path d="M157.758 157.602L157.758 157.758C178.454 157.758 198.948 153.678 218.069 145.749C237.191 137.821 254.564 126.201 269.199 111.552C283.834 96.9026 295.443 79.5115 303.363 60.3714C311.283 41.2314 315.36 20.7171 315.36 5.80872e-05L157.758 0.00028845L2.75833e-05 0.000244141C2.57739e-05 20.6968 4.08059 41.1907 12.0087 60.3119C19.9367 79.433 31.5571 96.8069 46.2063 111.442C60.8555 126.076 78.2466 137.685 97.3867 145.605C116.527 153.526 137.041 157.602 157.758 157.602Z" fill="#E8ADDB"/>
<path d="M157.758 157.758L315.36 157.758C315.36 178.475 311.283 198.989 303.363 218.129C295.443 237.269 283.834 254.66 269.199 269.31C254.564 283.959 237.191 295.579 218.069 303.507C198.948 311.435 178.454 315.516 157.758 315.516L157.758 315.204C137.041 315.204 116.527 311.127 97.3867 303.207C78.2466 295.287 60.8555 283.678 46.2063 269.043C31.5571 254.408 19.9367 237.035 12.0086 217.913C4.08058 198.792 1.19959e-05 178.298 1.38053e-05 157.602L157.758 157.602L157.758 157.758Z" fill="#E8ADDB"/></svg>
<div class="stage" id="stage">
  <div class="card" id="card">
    <div class="card-h"><span class="ch-t">Fragebogen Gründung</span><span class="ch-s">Finanzamt</span></div>
    <div class="form">
      <div class="field" id="f0">
        <div class="f-lbl">Art der Tätigkeit</div>
        <div class="f-input"><span class="f-val" id="fv0"></span><div class="f-check" id="fc0"><svg viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="white" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/></svg></div></div>
      </div>
      <div class="field" id="f1">
        <div class="f-lbl">Besteuerung</div>
        <div class="f-input"><span class="f-val" id="fv1"></span><div class="f-check" id="fc1"><svg viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="white" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/></svg></div></div>
      </div>
      <div class="field" id="f2">
        <div class="f-lbl">Geschätzter Jahresumsatz</div>
        <div class="f-input"><span class="f-val" id="fv2"></span><div class="f-check" id="fc2"><svg viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="white" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/></svg></div></div>
      </div>
      <div class="field" id="f3">
        <div class="f-lbl">Buchhaltungssoftware</div>
        <div class="f-input"><span class="f-val" id="fv3"></span><div class="f-check" id="fc3"><svg viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="white" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/></svg></div></div>
      </div>
    </div>
    <div class="submit" id="sub"><span class="sb-t">Fragebogen vollständig ausgefüllt</span><span class="sb-badge">beim Finanzamt eingereicht ✓</span></div>
  </div>
</div>
<script>
const stage=document.getElementById("stage");
function sf(){const w=stage.offsetWidth,h=stage.offsetHeight;document.documentElement.style.fontSize=Math.max(Math.min(Math.min(w/28,h/14),22),9)+"px"}
new ResizeObserver(sf).observe(stage);sf();
const card=document.getElementById("card"),sub=document.getElementById("sub");
const fields=[0,1,2,3].map(i=>document.getElementById("f"+i));
const fvals=[0,1,2,3].map(i=>document.getElementById("fv"+i));
const fchecks=[0,1,2,3].map(i=>document.getElementById("fc"+i));
const answers=["Freiberuflich","Regelbesteuerung","72.000 € / Jahr","Lexoffice"];
const H=4800,DO=600;
function typeVal(el,checkEl,text,delay){
  let i=0;
  el.innerHTML='<span class="cursor"></span>';
  const iv=setInterval(()=>{
    el.innerHTML=text.slice(0,i)+(i<text.length?'<span class="cursor"></span>':"");
    i++;if(i>text.length){clearInterval(iv);setTimeout(()=>checkEl.classList.add("ticked"),180)}
  },55);
}
function run(){
  card.style.transition="none";card.style.opacity="0";card.style.transform="translateY(.5em)";sub.style.transition="none";sub.style.opacity="0";
  fields.forEach(f=>{f.style.transition="none";f.classList.remove("v")});fvals.forEach(v=>v.innerHTML="");fchecks.forEach(c=>{c.classList.remove("ticked")});
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    card.style.transition="opacity .6s cubic-bezier(.4,0,.2,1),transform .6s cubic-bezier(.16,1,.3,1)";card.style.opacity="1";card.style.transform="none";
    fields.forEach((f,i)=>setTimeout(()=>{f.classList.add("v");typeVal(fvals[i],fchecks[i],answers[i],50)},350+i*700));
    setTimeout(()=>{sub.style.transition="opacity .4s";sub.style.opacity="1"},350+4*700);
    setTimeout(()=>{const t=`opacity ${DO}ms ease`;[card,sub].forEach(el=>{el.style.transition=t;el.style.opacity="0"});setTimeout(run,DO+150)},350+4*700+H);
  }));
}
setTimeout(run,250);
</script></body></html>
