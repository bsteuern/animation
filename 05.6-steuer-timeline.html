<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#E37383;font-family:"DM Sans",sans-serif;-webkit-font-smoothing:antialiased;display:flex;align-items:center;justify-content:center;overflow:hidden}
.stage{width:min(100vw,calc(100vh*(1116/558)));aspect-ratio:1116/558;position:relative;overflow:hidden;background:transparent;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.5em}
.card{background:#F9F4EC;border-radius:.6em;box-shadow:0 1em 4em rgba(0,0,0,.08),0 .25em .8em rgba(0,0,0,.04);width:28em;overflow:hidden;opacity:0;transform:translateY(.4em);transition:opacity .65s cubic-bezier(.4,0,.2,1),transform .65s cubic-bezier(.16,1,.3,1)}
.card-h{background:#0E0C1C;padding:.58em .9em;display:flex;justify-content:space-between;align-items:center}
.ch-t{font-size:.66em;font-weight:700;color:#F9F4EC}
.ch-s{font-size:.55em;font-weight:600;color:#E37383}
/* Horizontal stepper — two-row layout for perfect optical alignment */
.stepper{padding:.65em .9em .45em;display:flex;flex-direction:column;gap:.3em}
.sr{display:flex;align-items:center}
.lr{display:flex;align-items:flex-start}
.step-circle{width:2.1em;height:2.1em;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.58em;font-weight:700;border:2px solid rgba(14,12,28,.15);color:rgba(14,12,28,.25);flex-shrink:0;transition:background .4s,color .4s,border-color .4s,transform .4s cubic-bezier(.34,1.5,.64,1)}
.step-circle.done{background:#E37383;border-color:#E37383;color:#F9F4EC}
.step-label{font-size:.5em;color:rgba(14,12,28,.4);text-align:center;width:4.2em;flex-shrink:0;line-height:1.3;transition:color .3s}
.step-label.done{color:#0E0C1C;font-weight:600}
.conn{flex:1;height:2px;background:rgba(14,12,28,.1);position:relative;overflow:hidden}
.conn-lbl{flex:1}
.conn-fill{position:absolute;left:0;top:0;bottom:0;width:0;background:#E37383;transition:width .55s cubic-bezier(.4,0,.2,1)}
.conn-fill.v{width:100%}
/* Summary row */
.summary{display:flex;justify-content:space-between;padding:.45em .9em;background:rgba(14,12,28,.04);border-top:1px solid rgba(14,12,28,.07)}
.sv{font-size:.6em;font-weight:700;color:#E37383}
.sl{font-size:.6em;color:rgba(14,12,28,.4)}

.bg-svg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
</style></head><body>

<div class="stage" id="stage">
  <div class="card" id="card">
    <div class="card-h"><span class="ch-t">Steuerpflichten Jahresverlauf</span><span class="ch-s">UG 2024</span></div>
    <div class="stepper">
      <div class="sr">
        <div class="step-circle" id="sc0">Q1</div>
        <div class="conn"><div class="conn-fill" id="cf0"></div></div>
        <div class="step-circle" id="sc1">Q2</div>
        <div class="conn"><div class="conn-fill" id="cf1"></div></div>
        <div class="step-circle" id="sc2">Q3</div>
        <div class="conn"><div class="conn-fill" id="cf2"></div></div>
        <div class="step-circle" id="sc3">Q4</div>
      </div>
      <div class="lr">
        <div class="step-label" id="sl0">USt-VA Jan</div>
        <div class="conn-lbl"></div>
        <div class="step-label" id="sl1">Lohnsteuer</div>
        <div class="conn-lbl"></div>
        <div class="step-label" id="sl2">VZ-Anpassung</div>
        <div class="conn-lbl"></div>
        <div class="step-label" id="sl3">KSt-Erkl.</div>
      </div>
    </div>
    <div class="summary"><span class="sl">Jahresgesamtbelastung</span><span class="sv" id="sv">wird berechnet…</span></div>
  </div>
</div>
<script>
const stage=document.getElementById("stage");
function sf(){const w=stage.offsetWidth,h=stage.offsetHeight;document.documentElement.style.fontSize=Math.max(Math.min(Math.min(w/32,h/16),32),9)+"px"}
new ResizeObserver(sf).observe(stage);sf();
const card=document.getElementById("card"),sv=document.getElementById("sv");
const scs=[0,1,2,3].map(i=>document.getElementById("sc"+i));
const sls=[0,1,2,3].map(i=>document.getElementById("sl"+i));
const cfs=[0,1,2].map(i=>document.getElementById("cf"+i));
const H=4500,DO=600,STEP=700;
function run(){
  card.style.transition="none";card.style.opacity="0";card.style.transform="translateY(.4em)";sv.textContent="wird berechnet…";
  scs.forEach(s=>{s.classList.remove("done")});sls.forEach(s=>{s.classList.remove("done")});
  cfs.forEach(f=>{f.style.transition="none";f.classList.remove("v")});
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    card.style.transition="opacity .65s cubic-bezier(.4,0,.2,1),transform .65s cubic-bezier(.16,1,.3,1)";card.style.opacity="1";card.style.transform="none";
    [0,1,2,3].forEach(i=>{
      setTimeout(()=>{scs[i].classList.add("done");sls[i].classList.add("done");if(i<3){cfs[i].style.transition="width .55s cubic-bezier(.4,0,.2,1)";cfs[i].classList.add("v")}},400+i*STEP);
    });
    setTimeout(()=>sv.textContent="29.400 € optimiert",400+4*STEP);
    setTimeout(()=>{const t=`opacity ${DO}ms ease`;card.style.transition=t;card.style.opacity="0";setTimeout(run,DO+150)},400+4*STEP+H);
  }));
}
setTimeout(run,250);
</script></body></html>
