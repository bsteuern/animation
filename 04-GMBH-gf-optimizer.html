<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#1DB8C6;font-family:"DM Sans",sans-serif;-webkit-font-smoothing:antialiased;display:flex;align-items:center;justify-content:center;overflow:hidden}
.stage{width:100%;height:100%;position:relative;overflow:hidden;background:transparent;display:flex;flex-direction:column;align-items:center;justify-content:center}
.stage-bg{position:absolute;inset:0;width:100%;height:100%}
.card{background:#fff;border-radius:.65em;width:23.04em;box-shadow:0 .5em 2.5em rgba(0,0,0,.13);overflow:hidden;opacity:0;transform:translateY(.4em);transition:opacity .7s cubic-bezier(.4,0,.2,1),transform .7s cubic-bezier(.16,1,.3,1);position:relative}
.card-h{background:#162D3E;padding:.6em .9em;display:flex;justify-content:space-between;align-items:center}
.ch-title{font-size:.68em;font-weight:600;color:#F9F4EC}
.ch-tag{font-size:.56em;font-weight:600;background:rgba(29,184,198,.2);color:#1DB8C6;padding:.18em .55em;border-radius:20px}
.card-body{padding:.7em .9em .8em}
.split-header{display:flex;justify-content:space-between;margin-bottom:.35em}
.sh-item{display:flex;align-items:center;gap:.3em}
.sh-dot{width:.55em;height:.55em;border-radius:.12em;flex-shrink:0}
.sh-lbl{font-size:.56em;font-weight:600;color:#8a9fae}
.split-bar-wrap{position:relative;margin-bottom:.7em;overflow:hidden;border-radius:.4em}
.split-bar{display:flex;height:.72em;border-radius:.4em;overflow:hidden;gap:2px}
.seg-a{height:100%;background:#162D3E;width:0;transition:width 1.4s cubic-bezier(.4,0,.2,1);border-radius:.4em 0 0 .4em}
.seg-b{height:100%;background:#1DB8C6;width:0;transition:width 1.4s .1s cubic-bezier(.4,0,.2,1);border-radius:0 .4em .4em 0}
.bar-shine{position:absolute;top:0;left:-80%;width:50%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.55),transparent);transform:skewX(-15deg);opacity:0;pointer-events:none}
.amounts{display:flex;gap:.4em;margin-bottom:.65em}
.amt{flex:1;border-radius:.45em;padding:.5em .65em;opacity:0;transform:translateY(.3em);transition:opacity .45s ease,transform .45s ease}
.al{font-size:.5em;font-weight:700;letter-spacing:.09em;text-transform:uppercase;display:block;margin-bottom:.22em}
.av{font-size:.85em;font-weight:700;display:block}
.ap{font-size:.56em;font-weight:600;display:block;margin-top:.12em;opacity:.7}
#savings-badge{display:flex;align-items:center;justify-content:space-between;background:#162D3E;border-radius:2em;padding:.44em 1.3em;opacity:0;transform:scale(.85) translateY(.3em);transition:opacity .5s cubic-bezier(.4,0,.2,1),transform .5s cubic-bezier(.34,1.5,.64,1)}
.sb-txt{font-size:.58em;color:rgba(249,244,236,.65)}
.sb-num{font-size:.92em;font-weight:700;color:#1DB8C6;transition:transform .25s cubic-bezier(.34,1.8,.64,1)}
.sb-num.pulse{transform:scale(1.18)}
</style></head><body>
<div class="stage" id="stage">
  <svg class="stage-bg" viewBox="0 0 316 316" preserveAspectRatio="xMidYMid slice" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect width="157.449" height="157.758" transform="matrix(-1 -1.74846e-07 -1.73966e-07 1 157.758 0)" fill="#00C0CA"/>
    <path d="M0.308373 157.758C0.308377 137.041 4.38093 116.527 12.2935 97.3866C20.2061 78.2465 31.8037 60.8554 46.4242 46.2062C61.0448 31.5571 78.4019 19.9367 97.5045 12.0086C116.607 4.08052 137.081 -4.52078e-06 157.758 0L157.758 157.758L0.308373 157.758Z" fill="#00A1AA"/>
    <rect width="157.449" height="157.758" transform="matrix(1.31134e-07 -1 -1 -1.30255e-07 315.359 157.789)" fill="#00C0CA"/>
    <path d="M157.601 0.33963C178.318 0.339633 198.833 4.41219 217.973 12.3248C237.113 20.2373 254.504 31.835 269.153 46.4555C283.802 61.076 295.423 78.4331 303.351 97.5358C311.279 116.638 315.359 137.113 315.359 157.789L157.601 157.789L157.601 0.33963Z" fill="#00A1AA"/>
    <rect width="157.602" height="157.758" transform="matrix(-4.37114e-08 1 1 4.28323e-08 0 157.75)" fill="#00A1AA"/>
    <path d="M157.758 315.352C137.041 315.352 116.527 311.275 97.3866 303.355C78.2466 295.435 60.8554 283.826 46.2063 269.191C31.5571 254.557 19.9367 237.183 12.0086 218.062C4.08053 198.94 -1.81025e-06 178.447 0 157.75L157.758 157.75L157.758 315.352Z" fill="#00C0CA"/>
    <rect width="157.602" height="157.758" transform="matrix(1 1.74846e-07 1.73966e-07 -1 157.758 315.508)" fill="#00A1AA"/>
    <path d="M315.36 157.75C315.36 178.467 311.283 198.981 303.363 218.121C295.443 237.261 283.834 254.652 269.199 269.302C254.564 283.951 237.191 295.571 218.069 303.499C198.948 311.427 178.454 315.508 157.758 315.508L157.758 157.75L315.36 157.75Z" fill="#00C0CA"/>
  </svg>
  <div class="card" id="card">
    <div class="card-h"><span class="ch-title">Vergütungsoptimierung</span><span class="ch-tag">GmbH</span></div>
    <div class="card-body">
      <div class="split-header">
        <div class="sh-item"><div class="sh-dot" style="background:#162D3E"></div><span class="sh-lbl">Gehalt · 60 %</span></div>
        <div class="sh-item"><div class="sh-dot" style="background:#1DB8C6"></div><span class="sh-lbl">Ausschüttung · 40 %</span></div>
      </div>
      <div class="split-bar-wrap">
        <div class="split-bar">
          <div class="seg-a" id="sega"></div>
          <div class="seg-b" id="segb"></div>
        </div>
        <div class="bar-shine" id="shine"></div>
      </div>
      <div class="amounts">
        <div class="amt" id="am0" style="background:rgba(22,45,62,.06)">
          <span class="al" style="color:rgba(22,45,62,.5)">Gehalt</span>
          <span class="av" style="color:#162D3E" id="av0">0 €</span>
          <span class="ap" style="color:#162D3E">SV-befreit</span>
        </div>
        <div class="amt" id="am1" style="background:rgba(29,184,198,.1)">
          <span class="al" style="color:rgba(10,143,153,.7)">Ausschüttung</span>
          <span class="av" style="color:#0a8f99" id="av1">0 €</span>
          <span class="ap" style="color:#0a8f99">25 % Abgeltung</span>
        </div>
      </div>
      <div id="savings-badge">
        <span class="sb-txt">weniger Steuerlast pro Jahr</span>
        <span class="sb-num" id="sn">0 %</span>
      </div>
    </div>
  </div>
</div>
<script>
const stage=document.getElementById("stage");
function sf(){const w=stage.offsetWidth,h=stage.offsetHeight;document.documentElement.style.fontSize=Math.max(Math.min(Math.min(w/28,h/14),22),9)+"px"}
new ResizeObserver(sf).observe(stage);sf();
const card=document.getElementById("card"),sega=document.getElementById("sega"),segb=document.getElementById("segb"),shine=document.getElementById("shine");
const am0=document.getElementById("am0"),am1=document.getElementById("am1");
const av0=document.getElementById("av0"),av1=document.getElementById("av1");
const sb=document.getElementById("savings-badge"),sn=document.getElementById("sn");
const ease=t=>t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;
const H=5500,DO=700;
function fmt(v){return v.toLocaleString("de-DE")+" €"}
function countUp(el,target,dur,delay,formatter){
  setTimeout(()=>{const s=Date.now();(function t(){const p=Math.min((Date.now()-s)/dur,1);el.textContent=formatter(Math.round(ease(p)*target));if(p<1)requestAnimationFrame(t)})()},delay);
}
function shineBar(delay){
  setTimeout(()=>{
    shine.style.transition="none";shine.style.left="-80%";shine.style.opacity="1";
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      shine.style.transition="left .55s cubic-bezier(.4,0,.2,1),opacity .15s ease .45s";
      shine.style.left="130%";shine.style.opacity="0";
    }));
  },delay);
}
function pulseSn(delay){
  setTimeout(()=>{sn.classList.add("pulse");setTimeout(()=>sn.classList.remove("pulse"),300)},delay);
}
function run(){
  card.style.transition="none";card.style.opacity="0";card.style.transform="translateY(.4em)";
  sb.style.transition="none";sb.style.opacity="0";sb.style.transform="scale(.85) translateY(.3em)";
  sega.style.transition="none";sega.style.width="0";segb.style.transition="none";segb.style.width="0";
  shine.style.transition="none";shine.style.left="-80%";shine.style.opacity="0";
  [am0,am1].forEach(a=>{a.style.transition="none";a.style.opacity="0";a.style.transform="translateY(.3em)"});
  av0.textContent="0 €";av1.textContent="0 €";sn.textContent="0 %";sn.classList.remove("pulse");
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    setTimeout(()=>{card.style.transition="opacity .7s cubic-bezier(.4,0,.2,1),transform .7s cubic-bezier(.16,1,.3,1)";card.style.opacity="1";card.style.transform="none"},150);
    setTimeout(()=>{sega.style.transition="width 1.4s cubic-bezier(.4,0,.2,1)";sega.style.width="60%";segb.style.transition="width 1.4s .1s cubic-bezier(.4,0,.2,1)";segb.style.width="40%"},800);
    shineBar(2350);
    [am0,am1].forEach((a,i)=>{setTimeout(()=>{a.style.transition="opacity .45s ease,transform .45s ease";a.style.opacity="1";a.style.transform="none"},1200+i*200)});
    countUp(av0,72000,900,1300,fmt);
    countUp(av1,48000,900,1500,fmt);
    setTimeout(()=>{
      sb.style.transition="opacity .5s,transform .5s cubic-bezier(.34,1.5,.64,1)";sb.style.opacity="1";sb.style.transform="scale(1) translateY(0)";
      const s=Date.now();(function t(){const p=Math.min((Date.now()-s)/1100,1);sn.textContent=Math.round(ease(p)*15)+" %";if(p<1)requestAnimationFrame(t)})();
    },2400);
    pulseSn(3600);
    setTimeout(()=>{card.style.transition=`opacity ${DO}ms ease`;card.style.opacity="0";setTimeout(run,DO+150)},2700+H);
  }));
}
setTimeout(run,250);
</script></body></html>
