<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#1DB8C6;font-family:"DM Sans",sans-serif;-webkit-font-smoothing:antialiased;display:flex;align-items:center;justify-content:center;overflow:hidden}
.stage{width:100%;height:100%;position:relative;overflow:hidden;background:transparent;display:flex;flex-direction:column;align-items:center;justify-content:center}
.stage-bg{position:absolute;inset:0;width:100%;height:100%}
.scanner-card{background:#fff;border-radius:.65em;width:23.04em;overflow:hidden;box-shadow:0 .5em 2.5em rgba(0,0,0,.13);opacity:0;transform:translateY(.4em);transition:opacity .6s cubic-bezier(.4,0,.2,1),transform .6s cubic-bezier(.16,1,.3,1);position:relative}
.sc-head{background:#162D3E;padding:.58em .9em;display:flex;justify-content:space-between;align-items:center;gap:.5em}
.sc-ht{font-size:.65em;font-weight:600;color:#F9F4EC;flex:1}
.dots-span{color:#1DB8C6;display:inline-block;min-width:.85em}
.sc-status{font-size:.56em;font-weight:700;background:rgba(29,184,198,.25);color:#1DB8C6;padding:.2em .65em;border-radius:20px;transition:background .4s,color .4s;white-space:nowrap;flex-shrink:0}
.sc-status.done{background:#1a8f35;color:#fff}
.scan-area{position:relative;padding:.55em .9em .45em;overflow:hidden}
.sline{position:absolute;left:0;right:0;height:2px;background:rgba(29,184,198,.85);box-shadow:0 0 10px rgba(29,184,198,.6);top:0}
.row{display:flex;justify-content:space-between;padding:.36em 0;border-bottom:1px solid rgba(22,45,62,.06)}
.row.last-row{border:none;padding:.62em 0 .44em}
.rl{font-size:.6em;color:#8a9fae}
.rv{font-size:.62em;font-weight:600;color:rgba(22,45,62,.1);transition:color .38s ease}
.rv.lit{color:#162D3E}
.sc-foot{background:#162D3E;padding:.62em .9em;display:flex;justify-content:space-between;align-items:center;opacity:0;transition:opacity .45s}
.sf-l{font-size:.58em;color:rgba(249,244,236,.45)}
.sf-r{font-size:.72em;font-weight:700;color:#fff;display:flex;align-items:center;gap:.32em}
#inline-chk{width:1.1em;height:1.1em;border-radius:50%;background:#1DB8C6;flex-shrink:0;display:flex;align-items:center;justify-content:center}
#inline-chk svg{width:56%;height:56%}
</style></head><body>
<div class="stage" id="stage">
  <svg class="stage-bg" viewBox="0 0 316 316" preserveAspectRatio="xMidYMid slice" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect width="157.602" height="157.758" transform="matrix(-4.37114e-08 -1 -1 4.45905e-08 315.359 157.914)" fill="#00A1AA"/>
    <path d="M157.601 0.312316C178.318 0.312315 198.833 4.38881 217.973 12.309C237.113 20.2293 254.504 31.8381 269.153 46.4728C283.802 61.1075 295.423 78.4813 303.351 97.6025C311.279 116.724 315.359 137.218 315.359 157.914L157.601 157.914L157.601 0.312316Z" fill="#00C0CA"/>
    <rect width="157.602" height="157.758" transform="matrix(-4.37114e-08 -1 -1 4.45905e-08 315.359 315.516)" fill="#00A1AA"/>
    <path d="M157.601 157.914C178.318 157.914 198.833 161.99 217.973 169.911C237.113 177.831 254.504 189.44 269.153 204.074C283.802 218.709 295.423 236.083 303.351 255.204C311.279 274.325 315.359 294.819 315.359 315.516L157.601 315.516L157.601 157.914Z" fill="#00C0CA"/>
    <rect width="157.602" height="157.758" transform="matrix(-1 -8.74228e-08 -8.65437e-08 1 157.602 0)" fill="#00A1AA"/>
    <path d="M-0.000204924 157.758C-0.000203131 137.041 4.07629 116.527 11.9965 97.3866C19.9168 78.2466 31.5256 60.8554 46.1603 46.2062C60.795 31.5571 78.1688 19.9367 97.29 12.0086C116.411 4.08053 136.905 -2.71492e-06 157.602 0L157.602 157.758L-0.000204924 157.758Z" fill="#00C0CA"/>
    <rect width="157.602" height="157.758" transform="matrix(-1 -8.74228e-08 -8.65437e-08 1 157.602 157.758)" fill="#00A1AA"/>
    <path d="M-0.000204924 315.516C-0.000203131 294.799 4.07629 274.285 11.9965 255.144C19.9168 236.004 31.5256 218.613 46.1603 203.964C60.795 189.315 78.1688 177.695 97.29 169.766C116.411 161.838 136.905 157.758 157.602 157.758L157.602 315.516L-0.000204924 315.516Z" fill="#00C0CA"/>
  </svg>
  <div class="scanner-card" id="sc">
    <div class="sc-head">
      <span class="sc-ht"><span id="title-txt">Digitalisierung läuft</span><span class="dots-span" id="dots"></span></span>
      <span class="sc-status" id="stat">Scannt</span>
    </div>
    <div class="scan-area" id="sa">
      <div class="sline" id="sl"></div>
      <div class="row"><span class="rl">Eingangsrechnung</span><span class="rv" id="v0">1.840,00 €</span></div>
      <div class="row"><span class="rl">Kassenbon</span><span class="rv" id="v1">234,50 €</span></div>
      <div class="row"><span class="rl">Reisekosten</span><span class="rv" id="v2">890,00 €</span></div>
      <div class="row last-row"><span class="rl">GoBD-konform · automatisch</span><span class="rv" id="v3">geprüft</span></div>
    </div>
    <div class="sc-foot" id="scf">
      <span class="sf-l">LexOffice · PennyLane</span>
      <span class="sf-r" id="sfr">Alle gebucht<div id="inline-chk"><svg viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div></span>
    </div>
  </div>
</div>
<script>
const stage=document.getElementById("stage");
function sf(){const w=stage.offsetWidth,h=stage.offsetHeight;document.documentElement.style.fontSize=Math.max(Math.min(Math.min(w/28,h/14),22),9)+"px"}
new ResizeObserver(sf).observe(stage);sf();
const sc=document.getElementById("sc"),sa=document.getElementById("sa"),sl=document.getElementById("sl");
const stat=document.getElementById("stat"),scf=document.getElementById("scf"),sfr=document.getElementById("sfr");
const dots=document.getElementById("dots"),titleTxt=document.getElementById("title-txt");
const ic=document.getElementById("inline-chk");
const vals=[0,1,2,3].map(i=>document.getElementById("v"+i));
const H=3600,DO=700;
let dotsIv=null,dotStep=0;
function startDots(){dotStep=0;dots.textContent=".";dotsIv=setInterval(()=>{dotStep=(dotStep+1)%3;dots.textContent=[".","..","..."][dotStep]},360)}
function stopDots(){clearInterval(dotsIv);dotsIv=null;dots.textContent=""}
function setEl(el,props){Object.assign(el.style,props)}
function burstAt(cx,cy){
  const colors=["#F9F4EC","#1DB8C6","#fff","rgba(249,244,236,.8)","#1DB8C6"];
  for(let i=0;i<13;i++){
    const p=document.createElement("div");
    const angle=(i/13)*Math.PI*2+Math.random()*.4,dist=20+Math.random()*22,sz=Math.round(3+Math.random()*3);
    p.style.cssText=`position:absolute;width:${sz}px;height:${sz}px;background:${colors[i%colors.length]};border-radius:50%;left:${cx}px;top:${cy}px;transform:translate(-50%,-50%);opacity:1;pointer-events:none;z-index:200;transition:transform .6s cubic-bezier(.17,.84,.44,1),opacity .6s ease`;
    stage.appendChild(p);
    setTimeout(()=>{const dx=Math.cos(angle)*dist,dy=Math.sin(angle)*dist;p.style.transform=`translate(calc(-50% + ${dx}px),calc(-50% + ${dy}px))`;p.style.opacity="0"},20);
    setTimeout(()=>p.remove(),700);
  }
  const em=parseFloat(getComputedStyle(document.documentElement).fontSize);
  const r=document.createElement("div");
  r.style.cssText=`position:absolute;width:${em*1.1}px;height:${em*1.1}px;border:2.5px solid rgba(249,244,236,.75);border-radius:50%;left:${cx}px;top:${cy}px;transform:translate(-50%,-50%) scale(1);opacity:.9;pointer-events:none;z-index:199;transition:transform .65s cubic-bezier(.17,.84,.44,1),opacity .65s ease`;
  stage.appendChild(r);
  setTimeout(()=>{r.style.transform="translate(-50%,-50%) scale(3.5)";r.style.opacity="0"},20);
  setTimeout(()=>r.remove(),750);
}
function run(){
  stopDots();
  setEl(sc,{transition:"none",opacity:"0",transform:"translateY(.4em)"});
  setEl(scf,{transition:"none",opacity:"0"});
  setEl(ic,{transition:"none",opacity:"0",transform:"scale(0)"});
  sl.style.top="0";vals.forEach(v=>v.classList.remove("lit"));
  stat.className="sc-status";stat.textContent="Scannt";titleTxt.textContent="Digitalisierung läuft";
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    setTimeout(()=>{setEl(sc,{transition:"opacity .6s cubic-bezier(.4,0,.2,1),transform .6s cubic-bezier(.16,1,.3,1)",opacity:"1",transform:"none"});startDots()},150);
    setTimeout(()=>{const dur=2100,s=Date.now();(function tick(){const p=Math.min((Date.now()-s)/dur,1);sl.style.top=(p*100)+"%";if(p<1)requestAnimationFrame(tick)})()},650);
    vals.forEach((v,i)=>setTimeout(()=>v.classList.add("lit"),860+i*480));
    const doneAt=860+4*480;
    setTimeout(()=>{
      stopDots();titleTxt.textContent="Digitalisierung abgeschlossen";
      stat.classList.add("done");stat.textContent="Fertig ✓";
      setEl(scf,{transition:"opacity .45s",opacity:"1"});
    },doneAt);
    setTimeout(()=>{
      const sR=stage.getBoundingClientRect(),rR=sfr.getBoundingClientRect();
      const cx=rR.right-sR.left-4,cy=rR.top+rR.height/2-sR.top;
      burstAt(cx,cy);
      setTimeout(()=>{setEl(ic,{transition:"opacity .4s ease,transform .48s cubic-bezier(.34,1.7,.64,1)",opacity:"1",transform:"scale(1)"})},420);
    },doneAt+500);
    setTimeout(()=>{
      const t=`opacity ${DO}ms ease`;
      [sc,scf].forEach(el=>setEl(el,{transition:t,opacity:"0"}));
      setTimeout(run,DO+150);
    },doneAt+H);
  }));
}
setTimeout(run,250);
</script></body></html>
