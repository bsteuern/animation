<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#C531A4;font-family:"DM Sans",sans-serif;-webkit-font-smoothing:antialiased;display:flex;align-items:center;justify-content:center;overflow:hidden}
.stage{width:100%;height:100%;position:relative;overflow:hidden;background:transparent;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center}
.card{background:#F9F4EC;border-radius:.65em;width:min(92%,20em);box-shadow:0 .45em 2.2em rgba(0,0,0,.2);overflow:hidden;opacity:0;transition:opacity .6s cubic-bezier(.4,0,.2,1)}
/* Headline integrated in header */
.card-h{background:#C531A4;padding:.6em .9em .55em;display:flex;flex-direction:column;gap:.18em}
.ch-top{display:flex;justify-content:space-between;align-items:center}
.ch-t{font-size:.66em;font-weight:700;color:#F9F4EC}
.ch-s{font-size:.52em;font-weight:600;background:rgba(249,244,236,.2);color:#F9F4EC;padding:.13em .48em;border-radius:20px}
.ch-sub{font-size:.54em;color:rgba(249,244,236,.6)}
/* Shoulder: horizontal reference line from which everything hangs */
.shoulder{height:2px;background:rgba(249,244,236,.25);position:relative;margin:0 .9em}
/* Main content: thermometer + levels hang BELOW the shoulder */
.body{padding:.5em .9em .6em;display:flex;align-items:flex-start;gap:.8em}
/* Thermometer column */
.thermo-col{display:flex;flex-direction:column;align-items:center;gap:.3em;flex-shrink:0}
.th-tube{width:1.2em;height:8em;background:rgba(197,49,164,.1);border-radius:.6em;position:relative;overflow:hidden;box-shadow:inset 0 0 0 1.5px rgba(197,49,164,.2)}
.th-fill{position:absolute;bottom:0;left:0;right:0;height:100%;background:#C531A4;border-radius:.6em;transform:translateY(100%);transform-origin:bottom;will-change:transform}
/* Levels column — hangs alongside thermometer */
.levels{flex:1;display:flex;flex-direction:column;gap:.38em;padding-top:.25em}
.lv{display:flex;align-items:center;gap:.38em;opacity:0;transition:opacity .4s ease}
.lv.v{opacity:1}
.lv-bar{width:.22em;border-radius:.1em;flex-shrink:0;transition:background .4s}
.lv-bar.hit{background:#C531A4}
.lv-card{flex:1;padding:.3em .55em;border-radius:.38em;background:rgba(197,49,164,.07);border:1px solid rgba(197,49,164,.15)}
.lc-t{font-size:.58em;font-weight:700;color:#0E0C1C}
.lc-s{font-size:.5em;color:rgba(14,12,28,.42);margin-top:.04em}
/* Circle below tube showing count, no % sign */
.th-bulb{width:2em;height:2em;border-radius:50%;background:#C531A4;display:flex;align-items:center;justify-content:center;box-shadow:0 .2em .9em rgba(0,0,0,.2);margin-top:.28em;flex-shrink:0}
.tb-num{font-size:.72em;font-weight:700;color:#F9F4EC;letter-spacing:-.03em;line-height:1}

.bg-svg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
</style></head><body>
<svg class="bg-svg" viewBox="0 0 316 316" preserveAspectRatio="xMidYMid slice" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="157.602" height="157.758" transform="matrix(-4.37114e-08 -1 -1 4.45905e-08 315.359 157.914)" fill="#C531A4"/>
<rect width="157.602" height="157.758" transform="matrix(-4.37114e-08 -1 -1 4.45905e-08 315.359 315.516)" fill="#C531A4"/>
<rect width="157.602" height="157.758" transform="matrix(-1 -8.74228e-08 -8.65437e-08 1 157.602 0)" fill="#C531A4"/>
<rect width="157.602" height="157.758" transform="matrix(-1 -8.74228e-08 -8.65437e-08 1 157.602 157.758)" fill="#C531A4"/>
<path d="M157.602 157.914L157.602 157.758C136.905 157.758 116.411 161.838 97.2902 169.766C78.169 177.695 60.7952 189.315 46.1605 203.964C31.5258 218.613 19.917 236.004 11.9967 255.144C4.0765 274.285 0 294.799 0 315.516L157.602 315.516L315.36 315.516C315.36 294.819 311.279 274.325 303.351 255.204C295.423 236.083 283.803 218.709 269.153 204.074C254.504 189.44 237.113 177.831 217.973 169.911C198.833 161.99 178.319 157.914 157.602 157.914Z" fill="#E8ADDB"/>
<path d="M157.602 157.758L0 157.758C0 137.041 4.0765 116.527 11.9967 97.3866C19.917 78.2466 31.5258 60.8554 46.1605 46.2062C60.7952 31.5571 78.169 19.9367 97.2902 12.0086C116.411 4.08053 136.905 -2.71492e-06 157.602 0V0.312317C178.319 0.312348 198.833 4.38884 217.973 12.309C237.113 20.2293 254.504 31.8381 269.153 46.4728C283.803 61.1075 295.423 78.4813 303.351 97.6025C311.279 116.724 315.36 137.217 315.36 157.914H157.602L157.602 157.758Z" fill="#E8ADDB"/></svg>
<div class="stage" id="stage">
  <div class="card" id="card">
    <div class="card-h">
      <div class="ch-top"><span class="ch-t">EÜR-Optimierung</span><span class="ch-s">2024</span></div>
      <div class="ch-sub">Steuerersparnis durch vollständige Gewinnermittlung</div>
    </div>
    <div class="shoulder"></div>
    <div class="body">
      <div class="thermo-col">
        <div class="th-tube"><div class="th-fill" id="fill"></div></div>
        <div class="th-bulb"><div class="tb-num" id="pctNum">0</div></div>
      </div>
      <div class="levels">
        <div class="lv" id="lv0"><div class="lv-bar" id="lb0" style="height:1.6em;background:rgba(14,12,28,.12)"></div><div class="lv-card"><div class="lc-t">Betriebsausgaben</div><div class="lc-s">vollständig erfasst → −18.400 €</div></div></div>
        <div class="lv" id="lv1"><div class="lv-bar" id="lb1" style="height:1.6em;background:rgba(14,12,28,.12)"></div><div class="lv-card"><div class="lc-t">Abschreibungen</div><div class="lc-s">optimal gestaltet → −3.200 €</div></div></div>
        <div class="lv" id="lv2"><div class="lv-bar" id="lb2" style="height:1.6em;background:rgba(14,12,28,.12)"></div><div class="lv-card"><div class="lc-t">Sonderausgaben</div><div class="lc-s">berücksichtigt → −2.100 €</div></div></div>
        <div class="lv" id="lv3"><div class="lv-bar" id="lb3" style="height:1.6em;background:rgba(14,12,28,.12)"></div><div class="lv-card" style="border-color:rgba(197,49,164,.4);background:rgba(197,49,164,.1)"><div class="lc-t" style="color:#C531A4">Steuerersparnis gesamt</div><div class="lc-s" style="color:#C531A4;font-weight:600">−6.900 €</div></div></div>
      </div>
    </div>
  </div>
</div>
<script>
const stage=document.getElementById("stage");
function sf(){const w=stage.offsetWidth,h=stage.offsetHeight;document.documentElement.style.fontSize=Math.max(Math.min(Math.min(w/28,h/14),22),9)+"px"}
new ResizeObserver(sf).observe(stage);sf();
const card=document.getElementById("card"),fill=document.getElementById("fill"),pctNum=document.getElementById("pctNum");
const lvs=[0,1,2,3].map(i=>document.getElementById("lv"+i));
const lbs=[0,1,2,3].map(i=>document.getElementById("lb"+i));
const ease=t=>t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;
// Seamless loop: fill up → hold → drain → repeat; card never fades
let running=false;
function animatePct(from,to,dur,cb){
  const s=Date.now();
  (function t(){const p=Math.min((Date.now()-s)/dur,1);pctNum.textContent=Math.round(from+(to-from)*ease(p));if(p<1)requestAnimationFrame(t);else if(cb)cb()})();
}
function loop(){
  fill.style.transition="transform 2s cubic-bezier(.4,0,.2,1)";fill.style.transform="translateY(0%)";
  animatePct(0,100,2000);
  lvs.forEach((lv,i)=>setTimeout(()=>{lv.classList.add("v");lbs[i].classList.add("hit")},500+i*450));
  setTimeout(()=>{
    fill.style.transition="transform 1.6s cubic-bezier(.4,0,.2,1)";fill.style.transform="translateY(100%)";
    animatePct(100,0,1600);
    lvs.forEach(lv=>lv.classList.remove("v"));lbs.forEach(lb=>lb.classList.remove("hit"));
    setTimeout(loop,1900);
  },4500);
}
function run(){
  card.style.transition="none";card.style.opacity="0";
  fill.style.transition="none";fill.style.transform="translateY(100%)";pctNum.textContent="0";
  lvs.forEach(lv=>{lv.style.transition="none";lv.classList.remove("v")});
  lbs.forEach(lb=>{lb.style.transition="none";lb.classList.remove("hit")});
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    card.style.transition="opacity .6s cubic-bezier(.4,0,.2,1)";card.style.opacity="1";
    setTimeout(loop,400);
  }));
}
setTimeout(run,250);
</script></body></html>
