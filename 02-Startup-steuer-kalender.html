<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#F6DF35;font-family:"DM Sans",sans-serif;-webkit-font-smoothing:antialiased;display:flex;align-items:center;justify-content:center;overflow:hidden}
.stage{width:min(100vw,calc(100vh*(1116/558)));aspect-ratio:1116/558;position:relative;overflow:hidden;background:transparent;z-index:1;display:flex;align-items:center;justify-content:center;gap:.8em}
.cards-wrap{display:flex;align-items:stretch;gap:.8em}
.card{background:#F9F4EC;border-radius:.6em;overflow:hidden;box-shadow:0 .4em 2em rgba(14,12,28,.15);opacity:0;transform:translateY(.5em);transition:opacity .8s cubic-bezier(.4,0,.2,1),transform .8s cubic-bezier(.16,1,.3,1);display:flex;flex-direction:column}
.cal-card{width:13em}
.dl-card{width:11em}
/* Calendar */
.cal-h{padding:.55em .85em;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(14,12,28,.08);flex-shrink:0}
.ch-t{font-size:.66em;font-weight:700;color:#0E0C1C}
.ch-s{font-size:.56em;font-weight:600;color:rgba(14,12,28,.4)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;padding:.45em .6em .5em;flex:1;align-content:start}
.cd{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:.5em;border-radius:.3em;transition:background .5s,color .5s}
.cd.hdr{font-weight:700;color:rgba(14,12,28,.3);font-size:.46em}
.cd.past{color:rgba(14,12,28,.3)}
.cd.due{background:#0E0C1C;color:#F6DF35;font-weight:700}
/* Emotional animation: day 10 does a very gentle single breath */
.cd.due.heartbeat{animation:heartbeat 1.6s ease-in-out both}
@keyframes heartbeat{
  0%  {transform:scale(1)}
  35% {transform:scale(1.12)}
  100%{transform:scale(1)}
}
.cd.future{color:rgba(14,12,28,.18)}
/* Deadline list */
.dl-h{padding:.55em .85em;border-bottom:1px solid rgba(14,12,28,.08);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.dl-ht{font-size:.66em;font-weight:700;color:#0E0C1C}
.dl-body{padding:.35em .6em .45em;display:flex;flex-direction:column;flex:1;justify-content:space-around}
.dl-item{display:flex;align-items:flex-start;gap:.42em;padding:.3em .2em;opacity:0;transform:translateX(.6em);transition:opacity .55s cubic-bezier(.4,0,.2,1),transform .55s cubic-bezier(.16,1,.3,1)}
.dl-item.v{opacity:1;transform:none}
.dl-item+.dl-item{border-top:1px solid rgba(14,12,28,.07)}
.dl-dot{width:.55em;height:.55em;border-radius:50%;flex-shrink:0;margin-top:.15em;transform:scale(0);transition:transform .48s cubic-bezier(.34,1.6,.64,1)}
.dl-dot.pop{transform:scale(1)}
.dl-info{flex:1}
.dl-t{font-size:.62em;font-weight:600;color:#0E0C1C;display:block}
.dl-s{font-size:.52em;color:rgba(14,12,28,.4);margin-top:.04em;display:block}
.dl-badge{font-size:.5em;font-weight:700;padding:.15em .55em;border-radius:20px;flex-shrink:0;align-self:flex-start;margin-top:.1em;opacity:0;transform:translateY(.4em) scale(.75);transition:opacity .45s ease,transform .5s cubic-bezier(.34,1.5,.64,1)}
.dl-badge.pop{opacity:1;transform:none}
.done-b{background:#F6DF35;color:#0E0C1C}
.plan-b{background:rgba(14,12,28,.08);color:rgba(14,12,28,.45)}
/* Gentle echo ring from day 10 */
.ripple{position:absolute;border-radius:50%;border:1px solid rgba(14,12,28,.18);pointer-events:none;animation:rippleOut 1.4s ease-out both}
@keyframes rippleOut{from{transform:scale(1);opacity:.5}to{transform:scale(3.2);opacity:0}}

.bg-svg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
</style></head><body>
<svg class="bg-svg" viewBox="0 0 316 316" preserveAspectRatio="xMidYMid slice" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="157.449" height="157.758" transform="matrix(1 8.74228e-08 8.65437e-08 -1 157.75 315.352)" fill="#FBF2AE"/>
<path d="M315.199 157.594C315.199 178.311 311.127 198.825 303.214 217.965C295.302 237.105 283.704 254.496 269.084 269.145C254.463 283.795 237.106 295.415 218.003 303.343C198.901 311.271 178.427 315.352 157.75 315.352L157.75 157.594L315.199 157.594Z" fill="#F6DF35"/>
<rect width="157.449" height="157.758" transform="matrix(-4.37114e-08 1 1 4.28323e-08 0 157.758)" fill="#FBF2AE"/>
<path d="M157.758 315.207C137.041 315.207 116.527 311.135 97.3866 303.222C78.2466 295.31 60.8554 283.712 46.2063 269.091C31.5571 254.471 19.9367 237.114 12.0086 218.011C4.08053 198.908 -1.80937e-06 178.434 0 157.758L157.758 157.758L157.758 315.207Z" fill="#F6DF35"/>
<rect width="157.602" height="157.758" transform="matrix(-4.37114e-08 -1 -1 4.45905e-08 315.203 157.602)" fill="#F6DF35"/>
<path d="M157.445 -0.000184237C178.162 -0.000185161 198.676 4.07631 217.816 11.9965C236.957 19.9168 254.348 31.5256 268.997 46.1603C283.646 60.795 295.266 78.1688 303.195 97.29C311.123 116.411 315.203 136.905 315.203 157.602L157.445 157.602L157.445 -0.000184237Z" fill="#FBF2AE"/>
<rect width="157.602" height="157.758" transform="matrix(-1 -8.74228e-08 -8.65437e-08 1 157.609 0)" fill="#F6DF35"/>
<path d="M0.00760758 157.758C0.00760937 137.041 4.08411 116.527 12.0043 97.3866C19.9246 78.2466 31.5334 60.8554 46.1681 46.2062C60.8028 31.5571 78.1766 19.9367 97.2978 12.0086C116.419 4.08053 136.913 -2.71492e-06 157.609 0L157.609 157.758L0.00760758 157.758Z" fill="#FBF2AE"/></svg>
<div class="stage" id="stage">
  <div class="cards-wrap">
    <div class="card cal-card" id="cal">
      <div class="cal-h"><span class="ch-t">April 2025</span><span class="ch-s">Steuerfristen</span></div>
      <div class="cal-grid" id="grid"></div>
    </div>
    <div class="card dl-card" id="dlc">
      <div class="dl-h"><span class="dl-ht">Pflichten</span></div>
      <div class="dl-body">
        <div class="dl-item" id="dl0">
          <div class="dl-dot" id="dd0" style="background:#0E0C1C"></div>
          <div class="dl-info"><span class="dl-t">USt-Voranmeldung</span><span class="dl-s">Fällig 10. April</span></div>
          <span class="dl-badge done-b" id="db0">Eingereicht</span>
        </div>
        <div class="dl-item" id="dl1">
          <div class="dl-dot" id="dd1" style="background:#0E0C1C"></div>
          <div class="dl-info"><span class="dl-t">Lohnsteuer-Anmeldung</span><span class="dl-s">Fällig 10. April</span></div>
          <span class="dl-badge done-b" id="db1">Eingereicht</span>
        </div>
        <div class="dl-item" id="dl2">
          <div class="dl-dot" id="dd2" style="background:rgba(14,12,28,.25)"></div>
          <div class="dl-info"><span class="dl-t">Körperschaftsteuer</span><span class="dl-s">Fällig 31. Mai</span></div>
          <span class="dl-badge plan-b" id="db2">Geplant</span>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
const stage=document.getElementById("stage");
function sf(){const w=stage.offsetWidth,h=stage.offsetHeight;document.documentElement.style.fontSize=Math.max(Math.min(Math.min(w/28,h/14),22),9)+"px"}
new ResizeObserver(sf).observe(stage);sf();
const cal=document.getElementById("cal"),dlc=document.getElementById("dlc");
const dls=[0,1,2].map(i=>document.getElementById("dl"+i));
const dds=[0,1,2].map(i=>document.getElementById("dd"+i));
const dbs=[0,1,2].map(i=>document.getElementById("db"+i));
let dueCel=null;const H=5500,DO=700;
function buildGrid(){
  const grid=document.getElementById("grid");grid.innerHTML="";dueCel=null;
  ["Mo","Di","Mi","Do","Fr","Sa","So"].forEach(d=>{const el=document.createElement("div");el.className="cd hdr";el.textContent=d;grid.appendChild(el)});
  const empty=document.createElement("div");empty.className="cd";grid.appendChild(empty);
  for(let i=1;i<=30;i++){
    const el=document.createElement("div");
    if(i===10){el.className="cd due";dueCel=el}
    else if(i<10)el.className="cd past";
    else el.className="cd future";
    el.textContent=i;grid.appendChild(el);
  }
}
function spawnRipple(el){
  const sR=stage.getBoundingClientRect(),eR=el.getBoundingClientRect();
  const cx=eR.left+eR.width/2-sR.left,cy=eR.top+eR.height/2-sR.top,sz=eR.width;
  const r=document.createElement("div");r.className="ripple";
  r.style.cssText=`position:absolute;width:${sz}px;height:${sz}px;left:${cx}px;top:${cy}px;margin-left:-${sz/2}px;margin-top:-${sz/2}px;z-index:100`;
  stage.appendChild(r);setTimeout(()=>r.remove(),1500);
}
function run(){
  [cal,dlc].forEach(el=>{el.style.transition="none";el.style.opacity="0";el.style.transform="translateY(.5em)"});
  dls.forEach(d=>{d.style.transition="none";d.classList.remove("v")});
  dds.forEach(d=>{d.style.transition="none";d.classList.remove("pop")});
  dbs.forEach(b=>{b.style.transition="none";b.classList.remove("pop")});
  buildGrid();
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    // Cards slide up slowly with stagger
    setTimeout(()=>{cal.style.transition="opacity .8s cubic-bezier(.4,0,.2,1),transform .8s cubic-bezier(.16,1,.3,1)";cal.style.opacity="1";cal.style.transform="none"},150);
    setTimeout(()=>{dlc.style.transition="opacity .8s cubic-bezier(.4,0,.2,1),transform .8s cubic-bezier(.16,1,.3,1)";dlc.style.opacity="1";dlc.style.transform="none"},320);
    // Emotional moment: day 10 heartbeat + ripples
    setTimeout(()=>{
      if(dueCel){
        dueCel.classList.remove("heartbeat");void dueCel.offsetWidth;dueCel.classList.add("heartbeat");
        spawnRipple(dueCel);
      }
    },1100);
    // Items slide in slowly with generous stagger
    dls.forEach((d,i)=>{
      const delay=850+i*550;
      setTimeout(()=>{d.classList.add("v")},delay);
      setTimeout(()=>{dds[i].classList.add("pop")},delay+180);
      setTimeout(()=>{dbs[i].classList.add("pop")},delay+400);
    });
    setTimeout(()=>{const t=`opacity ${DO}ms ease`;[cal,dlc].forEach(el=>{el.style.transition=t;el.style.opacity="0"});setTimeout(run,DO+150)},850+2*550+500+H);
  }));
}
setTimeout(run,250);
</script></body></html>
