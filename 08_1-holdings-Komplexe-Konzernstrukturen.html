<!DOCTYPE html><html lang="de"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>08_1</title><link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#6A6872}
.stage{
  position:relative;
  width:100%;
  aspect-ratio:1116/558;
  max-height:100%;
  background:#6A6872;
  overflow:hidden;
  font-family:'DM Sans',sans-serif;
  color:#0E0C1C;
}
.f{opacity:0;transition:opacity .55s ease}
.f.in{opacity:1}
.u{opacity:0;transform:translateY(7px);transition:opacity .5s ease,transform .5s cubic-bezier(.25,.46,.45,.94)}
.u.in{opacity:1;transform:translateY(0)}
.card{
  background:#F9F4EC;
  border-radius:18px;
  position:absolute;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  width:62%;
  overflow:hidden;
}
.ch{
  padding:.75em 1.2em;
  border-bottom:1px solid rgba(202,202,205,.4);
}
.ch-t{font-size:.8em;font-weight:600;color:#0E0C1C}
.ch-s{font-size:.6em;color:#CACACD;margin-top:.1em}
.row{
  display:flex;
  align-items:center;
  gap:.6em;
  padding:.58em 1.2em;
  border-bottom:1px solid rgba(202,202,205,.18);
}
.row:last-child{border-bottom:none}
.bar{width:3px;border-radius:2px;align-self:stretch;min-height:1.5em;flex-shrink:0}
.rn{font-size:.72em;font-weight:500;color:#0E0C1C;flex:1;min-width:0}
.tag{
  flex-shrink:0;
  font-size:.58em;font-weight:500;
  border-radius:100px;
  padding:.14em .6em;
  white-space:nowrap;
}
</style>
</head><body>
<div class="stage" id="stage">
<div class="card f" id="card">
  <div class="ch">
    <div class="ch-t">Mehrstufige Holdingstruktur</div>
    <div class="ch-s">Vier Konzernebenen</div>
  </div>
  <div class="row u" id="e0" style="padding-left:1.2em">
    <div class="bar" style="background:#0E0C1C"></div>
    <span class="rn">Konzernebene</span>
    <span class="tag" style="background:#0E0C1C;color:#F9F4EC">Ebene 1</span>
  </div>
  <div class="row u" id="e1" style="padding-left:2em">
    <div class="bar" style="background:#CACACD"></div>
    <span class="rn">Holdinggesellschaft</span>
    <span class="tag" style="background:rgba(202,202,205,.3);color:#0E0C1C">Ebene 2</span>
  </div>
  <div class="row u" id="e2" style="padding-left:2.8em">
    <div class="bar" style="background:#CACACD;opacity:.6"></div>
    <span class="rn">Tochtergesellschaft</span>
    <span class="tag" style="background:rgba(202,202,205,.3);color:#0E0C1C">Ebene 3</span>
  </div>
  <div class="row u" id="e3" style="padding-left:3.6em">
    <div class="bar" style="background:#CACACD;opacity:.35"></div>
    <span class="rn">Operative Einheit</span>
    <span class="tag" style="background:rgba(202,202,205,.3);color:#0E0C1C">Ebene 4</span>
  </div>
</div></div>
<script>const S=document.getElementById('stage');
const rz=()=>{
  const w=S.offsetWidth,h=S.offsetHeight;
  S.style.fontSize=Math.max(Math.min(Math.min(w/24,h/12),22),9)+'px';
};
new ResizeObserver(rz).observe(S);rz();
const wait=ms=>new Promise(r=>setTimeout(r,ms));
const $=id=>document.getElementById(id);
const show=id=>{const e=$(id);if(e)e.classList.add('in')};
const hide=id=>{const e=$(id);if(e)e.classList.remove('in')};
async function run(){
  hide('card');['e0','e1','e2','e3'].forEach(hide);
  await wait(300); show('card'); await wait(350);
  for(const id of ['e0','e1','e2','e3']){show(id);await wait(360);}
  await wait(4500); run();
}
run();</script></body></html>
