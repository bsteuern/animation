<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#F6DF35;font-family:"DM Sans",sans-serif;-webkit-font-smoothing:antialiased;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.stage{width:min(100vw,calc(100vh*(1116/558)));aspect-ratio:1116/558;position:relative;overflow:hidden;background:#F6DF35;}
.rcw{width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;padding:6% 13%;gap:.35em;}
/* standard card */
.rc{display:flex;align-items:center;gap:.52em;background:#F9F4EC;padding:.52em .72em;border-radius:.46em;box-shadow:0 2px 14px rgba(14,12,28,.08);will-change:opacity,transform;opacity:0;transform:translateY(.5em);width:100%;}
/* conclusion card */
.rc-last{background:#fff;box-shadow:0 6px 28px rgba(14,12,28,.16);}
.gap-before{margin-top:.22em;}
.ri{width:1.85em;height:1.85em;display:flex;align-items:center;justify-content:center;flex-shrink:0;border-radius:.34em;}
.rm{flex:1;min-width:0;}
.rt{font-size:.78em;font-weight:600;color:#0E0C1C;display:block;white-space:nowrap;line-height:1.2;}
.rs{font-size:.61em;color:#8A8577;display:block;margin-top:.05em;white-space:nowrap;}
.rb{font-size:.59em;font-weight:700;padding:.2em .62em;border-radius:.3em;flex-shrink:0;opacity:0;transform:scale(.7);will-change:opacity,transform;white-space:nowrap;letter-spacing:.01em;}
.rb-r{background:rgba(185,28,28,.1);color:#B91C1C;}
.rb-o{background:rgba(213,90,0,.1);color:#D15A00;}
.rb-conclusion{background:#F6DF35;color:#0E0C1C;}
</style>
</head>
<body>
<div class="stage" id="stage">
  <div class="rcw">
    <!-- Row 0 -->
    <div class="rc" id="r0">
      <div class="ri" style="background:rgba(185,28,28,.08)">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="2" y="4" width="10" height="8.5" stroke="#B91C1C" stroke-width="1.2" rx=".5"/><line x1="5" y1="2" x2="5" y2="5" stroke="#B91C1C" stroke-width="1.2" stroke-linecap="round"/><line x1="9" y1="2" x2="9" y2="5" stroke="#B91C1C" stroke-width="1.2" stroke-linecap="round"/><line x1="2" y1="7" x2="12" y2="7" stroke="#B91C1C" stroke-width="1.1"/><rect x="5.5" y="8.5" width="3" height="2.5" fill="#B91C1C"/></svg>
      </div>
      <div class="rm"><span class="rt">UStVA Januar nicht abgegeben</span><span class="rs">Frist: 10. Februar</span></div>
      <div class="rb rb-r" id="b0">Verpasst</div>
    </div>
    <!-- Row 1 -->
    <div class="rc" id="r1">
      <div class="ri" style="background:rgba(213,90,0,.08)">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 2L12.5 11.5H1.5L7 2Z" stroke="#D15A00" stroke-width="1.2" stroke-linejoin="round"/><line x1="7" y1="5.5" x2="7" y2="8.5" stroke="#D15A00" stroke-width="1.3" stroke-linecap="round"/><circle cx="7" cy="10" r=".65" fill="#D15A00"/></svg>
      </div>
      <div class="rm"><span class="rt">Säumniszuschlag läuft an</span><span class="rs">1 % pro angefangenen Monat</span></div>
      <div class="rb rb-o" id="b1">Automatisch</div>
    </div>
    <!-- Row 2 -->
    <div class="rc" id="r2">
      <div class="ri" style="background:rgba(185,28,28,.08)">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="2.5" y="1.5" width="9" height="11" stroke="#B91C1C" stroke-width="1.2" rx=".5"/><line x1="4.5" y1="5" x2="9.5" y2="5" stroke="#B91C1C" stroke-width="1.1" stroke-linecap="round"/><line x1="4.5" y1="7" x2="9.5" y2="7" stroke="#B91C1C" stroke-width="1.1" stroke-linecap="round"/><line x1="4.5" y1="9" x2="7.5" y2="9" stroke="#B91C1C" stroke-width="1.1" stroke-linecap="round"/></svg>
      </div>
      <div class="rm"><span class="rt">Jahresabschluss nicht offengelegt</span><span class="rs">Bundesanzeiger-Pflicht verletzt</span></div>
      <div class="rb rb-r" id="b2">Verzug</div>
    </div>
    <!-- Row 3: Conclusion -->
    <div class="rc rc-last gap-before" id="r3">
      <div class="ri" style="background:rgba(14,12,28,.06)">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="4.8" stroke="#0E0C1C" stroke-width="1.3"/><line x1="7" y1="4.2" x2="7" y2="7.5" stroke="#0E0C1C" stroke-width="1.4" stroke-linecap="round"/><circle cx="7" cy="9.5" r=".7" fill="#0E0C1C"/></svg>
      </div>
      <div class="rm"><span class="rt">Ordnungsgeld droht</span><span class="rs">Bei verspäteter Offenlegung</span></div>
      <div class="rb rb-conclusion" id="b3">bis 25.000 €</div>
    </div>
  </div>
</div>
<script>
const stage=document.getElementById("stage");
function sf(){const w=stage.offsetWidth,h=stage.offsetHeight;stage.style.fontSize=Math.max(Math.min(Math.min(w/28,h/14),22),9)+"px";}
new ResizeObserver(sf).observe(stage);sf();
const R=[0,1,2,3].map(i=>document.getElementById("r"+i));
const B=[0,1,2,3].map(i=>document.getElementById("b"+i));
const S=220,CO=430,H=3400,DI=560,DO=420;
function run(){
  R.forEach(r=>{r.style.transition="none";r.style.opacity="0";r.style.transform="translateY(.5em)"});
  B.forEach(b=>{b.style.transition="none";b.style.opacity="0";b.style.transform="scale(.7)"});
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    R.forEach((r,i)=>setTimeout(()=>{
      r.style.transition=`opacity ${DI}ms cubic-bezier(.4,0,.2,1),transform ${DI}ms cubic-bezier(.4,0,.2,1)`;
      r.style.opacity="1";r.style.transform="translateY(0)";
    },i*S));
    B.forEach((b,i)=>setTimeout(()=>{
      b.style.transition="opacity .35s ease,transform .44s cubic-bezier(.34,1.5,.64,1)";
      b.style.opacity="1";b.style.transform="scale(1)";
    },i*S+CO));
    setTimeout(()=>{
      R.forEach(r=>{r.style.transition=`opacity ${DO}ms ease,transform ${DO}ms ease`;r.style.opacity="0";r.style.transform="translateY(-.3em)"});
      B.forEach(b=>{b.style.transition=`opacity ${DO}ms ease`;b.style.opacity="0"});
      setTimeout(run,DO+100);
    },3*S+CO+560+H);
  }));
}
setTimeout(run,170);
</script>
</body>
</html>
