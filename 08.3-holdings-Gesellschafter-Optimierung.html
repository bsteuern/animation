<!DOCTYPE html><html lang="de"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>08_3</title><link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#6A6872;display:flex;align-items:center;justify-content:center}
.stage{
  position:relative;
  width:100%;
  aspect-ratio:1116/558;
  max-height:100%;
  background:#6A6872;
  overflow:hidden;
  font-family:'DM Sans',sans-serif;
  color:#0E0C1C;
}
.f{opacity:0;transition:opacity .55s ease}
.f.in{opacity:1}
.u{opacity:0;transform:translateY(6px);transition:opacity .45s ease,transform .45s cubic-bezier(.25,.46,.45,.94)}
.u.in{opacity:1;transform:translateY(0)}
.wrap{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  display:flex;gap:.7em;width:92%;align-items:stretch;
}
.cc{
  flex:1.8;background:#F9F4EC;border-radius:16px;
  overflow:hidden;display:flex;flex-direction:column;
}
.cc-head{
  padding:.55em .9em;border-bottom:1px solid rgba(202,202,205,.35);
  display:flex;justify-content:space-between;align-items:center;gap:.4em;flex-shrink:0;
}
.cc-t{font-size:.68em;font-weight:600;color:#0E0C1C;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.leg{display:flex;gap:.55em;flex-shrink:0}
.li{display:flex;align-items:center;gap:.28em;font-size:.56em;color:#0E0C1C;white-space:nowrap}
.ld{width:11px;height:2px;border-radius:2px;flex-shrink:0}
.cv-wrap{flex:1;min-height:0;padding:.3em .6em .45em}
.stats{display:flex;flex-direction:column;gap:.5em;flex:1;min-width:0}
.sb{
  background:#F9F4EC;border-radius:14px;
  padding:.6em .8em;flex:1;
  display:flex;flex-direction:column;justify-content:center;
}
.sb-dark{background:#0E0C1C}
.sb-n{font-size:.95em;font-weight:700;color:#0E0C1C;line-height:1;min-height:.95em}
.sb-dark .sb-n{color:#F9F4EC}
.sb-l{font-size:.55em;color:#CACACD;margin-top:.22em}
</style>
</head><body>
<div class="stage" id="stage">
<div class="wrap f" id="wrap">
  <div class="cc">
    <div class="cc-head">
      <div class="cc-t">Vermögensentwicklung 20 Jahre</div>
      <div class="leg">
        <div class="li"><div class="ld" style="background:#0E0C1C"></div>Thesaurierung</div>
        <div class="li"><div class="ld" style="background:#CACACD"></div>Ausschüttung</div>
      </div>
    </div>
    <div class="cv-wrap">
      <canvas id="cv" style="width:100%;height:100%;display:block"></canvas>
    </div>
  </div>
  <div class="stats">
    <div class="sb"><div class="sb-n" id="sn0">–</div><div class="sb-l">Thesaurierung · 20 J.</div></div>
    <div class="sb"><div class="sb-n" id="sn1" style="color:#CACACD">–</div><div class="sb-l">Ausschüttung · 20 J.</div></div>
    <div class="sb sb-dark"><div class="sb-n" id="sn2">–</div><div class="sb-l">Faktor Holding</div></div>
  </div>
</div></div>
<script>const S=document.getElementById('stage');
const rz=()=>{
  const w=S.offsetWidth,h=S.offsetHeight;
  S.style.fontSize=Math.max(Math.min(Math.min(w/32,h/16),22),9)+'px';
};
new ResizeObserver(rz).observe(S);rz();
const wait=ms=>new Promise(r=>setTimeout(r,ms));
const $=id=>document.getElementById(id);
const show=id=>{const e=$(id);if(e)e.classList.add('in')};
const hide=id=>{const e=$(id);if(e)e.classList.remove('in')};
const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');
let prog=0,raf=null,active=false;
function rsz(){
  const pr=devicePixelRatio||1;
  cv.width=cv.offsetWidth*pr;cv.height=cv.offsetHeight*pr;
  ctx.setTransform(pr,0,0,pr,0,0);
  if(active)draw();
}
new ResizeObserver(rsz).observe(cv);
const curves=[
  {c:'#0E0C1C',w:2,f:t=>Math.pow(1+t*3.84,1.5)/Math.pow(4.84,1.5)},
  {c:'#CACACD',w:1.4,f:t=>Math.pow(1+t*1.5,1.1)/Math.pow(2.5,1.1)*.65+.04},
];
function draw(){
  const W=cv.offsetWidth,H=cv.offsetHeight,P={l:6,r:4,t:6,b:14};
  const CW=W-P.l-P.r,CH=H-P.t-P.b;
  ctx.clearRect(0,0,W,H);
  for(let i=0;i<=4;i++){
    const y=P.t+CH-i/4*CH;
    ctx.strokeStyle='rgba(202,202,205,.2)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(P.l,y);ctx.lineTo(P.l+CW,y);ctx.stroke();
  }
  ctx.fillStyle='rgba(202,202,205,.5)';ctx.font='7px DM Sans';ctx.textAlign='center';
  ['0','5J','10J','15J','20J'].forEach((yr,i)=>{ctx.fillText(yr,P.l+i/4*CW,P.t+CH+11)});
  curves.forEach(l=>{
    ctx.strokeStyle=l.c;ctx.lineWidth=l.w;ctx.beginPath();let s=false;
    for(let i=0;i<=120;i++){
      const t=(i/120)*prog;if(t>1)break;
      const x=P.l+t*CW,y=P.t+CH-l.f(t)*CH;
      if(!s){ctx.moveTo(x,y);s=true;}else ctx.lineTo(x,y);
    }
    ctx.stroke();
  });
}
function updateStats(){
  const t=prog;
  const s0=$('sn0'),s1=$('sn1'),s2=$('sn2');
  if(s0)s0.textContent=t>0?'€ '+(t*4.8).toFixed(1)+' Mio.':'–';
  if(s1)s1.textContent=t>0?'€ '+(t*1.25).toFixed(2)+' Mio.':'–';
  if(s2)s2.textContent=t>0?'× '+(t*3.8).toFixed(1):'–';
}
function loop(){raf=requestAnimationFrame(loop);if(active){prog=Math.min(1,prog+.005);draw();updateStats();}}
async function run(){
  cancelAnimationFrame(raf);active=false;prog=0;hide('wrap');
  ['sn0','sn1','sn2'].forEach(id=>{const e=$(id);if(e)e.textContent='–'});
  ctx.clearRect(0,0,cv.offsetWidth,cv.offsetHeight);
  await wait(300);show('wrap');
  await new Promise(r=>requestAnimationFrame(r));rsz();
  await wait(400);active=true;loop();
  await wait(6500);run();
}
run();</script></body></html>
