<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#C531A4;font-family:"DM Sans",sans-serif;-webkit-font-smoothing:antialiased;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.stage{width:min(100vw,calc(100vh*(1116/558)));aspect-ratio:1116/558;position:relative;overflow:hidden;background:#C531A4;}
</style>
</head>
<body>
<div class="stage" id="stage">
  <div style="width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;padding:5% 11%;gap:.32em;">
    <div id="sl-wrap" style="display:flex;flex-direction:column;overflow:hidden;border-radius:.46em;">
      <div id="sl0" style="background:#C531A4;padding:.5em .75em;display:flex;align-items:center;justify-content:space-between;opacity:0;transform:translateY(-100%);">
        <span style="font-size:.65em;font-weight:600;color:#fff;">Einkommensteuer</span>
        <span style="font-size:.65em;font-weight:700;color:rgba(255,255,255,.92);">500 €</span>
      </div>
      <div id="sl1" style="background:rgba(249,244,236,.92);padding:.5em .75em;display:flex;align-items:center;justify-content:space-between;opacity:0;transform:translateY(-100%);">
        <span style="font-size:.65em;font-weight:600;color:#0E0C1C;">Krankenversicherung</span>
        <span style="font-size:.65em;font-weight:700;color:#0E0C1C;">350 €</span>
      </div>
      <div id="sl2" style="background:rgba(249,244,236,.75);padding:.5em .75em;display:flex;align-items:center;justify-content:space-between;opacity:0;transform:translateY(-100%);">
        <span style="font-size:.65em;font-weight:600;color:#0E0C1C;">Rentenversicherung</span>
        <span style="font-size:.65em;font-weight:700;color:#0E0C1C;">290 €</span>
      </div>
      <div id="sl3" style="background:rgba(249,244,236,.55);padding:.5em .75em;display:flex;align-items:center;justify-content:space-between;opacity:0;transform:translateY(-100%);">
        <span style="font-size:.65em;font-weight:600;color:#0E0C1C;">Liquiditätspuffer</span>
        <span style="font-size:.65em;font-weight:700;color:#0E0C1C;">200 €</span>
      </div>
    </div>
    <div id="sl-res" style="display:flex;align-items:center;justify-content:space-between;background:#F9F4EC;border-radius:.46em;padding:.44em .72em;opacity:0;transform:translateY(.3em);">
      <span style="font-size:.63em;font-weight:600;color:rgba(14,12,28,.6);">Monatliche Rücklagen</span>
      <span style="font-size:.63em;font-weight:700;color:#C531A4;">Gesamt: 1.340 €/Monat</span>
    </div>
  </div>
</div>
<script>
const stage=document.getElementById("stage");
function sf(){const w=stage.offsetWidth,h=stage.offsetHeight;stage.style.fontSize=Math.max(Math.min(Math.min(w/28,h/14),22),9)+"px";}
new ResizeObserver(sf).observe(stage);sf();
const layers=[0,1,2,3].map(i=>document.getElementById("sl"+i));
const res=document.getElementById("sl-res"),wrap=document.getElementById("sl-wrap");
const HOLD=3500,DO=400,SI=300;
function show(){
  wrap.style.boxShadow="none";
  layers.forEach(l=>{l.style.transition="none";l.style.opacity="0";l.style.transform="translateY(-100%)";});
  res.style.transition="none";res.style.opacity="0";res.style.transform="translateY(.3em)";
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    layers.forEach((l,i)=>setTimeout(()=>{
      if(i===0)wrap.style.boxShadow="0 8px 32px rgba(14,12,28,.22)";
      l.style.transition="opacity .4s ease,transform .45s cubic-bezier(.4,0,.2,1)";
      l.style.opacity="1";l.style.transform="translateY(0)";
    },200+i*SI));
    setTimeout(()=>{
      res.style.transition="opacity .5s ease,transform .5s cubic-bezier(.4,0,.2,1)";
      res.style.opacity="1";res.style.transform="translateY(0)";
    },200+3*SI+300);
    setTimeout(()=>{
      [...layers,res].forEach(e=>{e.style.transition=`opacity ${DO}ms ease`;e.style.opacity="0";});
      wrap.style.boxShadow="none";
      setTimeout(show,DO+100);
    },HOLD);
  }));
}
setTimeout(show,200);
</script>
</body>
</html>
