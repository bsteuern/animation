<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F9F4EC;--w:#ffffff;--tx:#162D3E;--sub:#4a6070;--mu:#8a9fae;
  --ln:rgba(22,45,62,0.08);--ln2:rgba(22,45,62,0.04);
  --ac:#1DB8C6;--ac2:rgba(29,184,198,0.10);--r:.52em;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);
  font-family:"DM Sans",ui-sans-serif,sans-serif;
  -webkit-font-smoothing:antialiased;color:var(--tx)}
</style>
</head>
<body>
<style>
.card{
  width:100%;height:100%;
  display:flex;flex-direction:column;justify-content:center;
  padding:6% 7%;gap:.38em;
}
.row{
  display:flex;align-items:center;gap:.65em;
  background:var(--w);border-radius:var(--r);
  padding:.6em .75em;border:1px solid var(--ln2);
  will-change:opacity,transform;
}
.ico{width:1.9em;height:1.9em;border-radius:.3em;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ib{background:var(--ac2)}
.id{background:var(--ln2)}
.ig{background:rgba(52,199,89,.10)}
.io{background:rgba(22,45,62,.06)}
.meta{flex:1;min-width:0}
.t1{font-size:.74em;font-weight:500;color:var(--tx);display:block}
.t2{font-size:.62em;color:var(--mu);display:block;margin-top:.06em}
.chk{
  width:1.15em;height:1.15em;border-radius:50%;background:#1DB8C6;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-left:auto;will-change:opacity,transform;
}
.chk svg{width:52%;height:52%}
</style>

<div class="card">
  <div class="row" id="r0">
    <div class="ico ib">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
        <rect x="2" y="1.5" width="9" height="10" rx="1.3" stroke="#1DB8C6" stroke-width="1.2" fill="none"/>
        <line x1="4.5" y1="4.5" x2="8.5" y2="4.5" stroke="#1DB8C6" stroke-width="1.1" stroke-linecap="round"/>
        <line x1="4.5" y1="6.5" x2="8.5" y2="6.5" stroke="#1DB8C6" stroke-width="1.1" stroke-linecap="round"/>
        <line x1="4.5" y1="8.5" x2="7"   y2="8.5" stroke="#1DB8C6" stroke-width="1.1" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="meta"><span class="t1">Bilanz aufgestellt</span><span class="t2">Aktiva &amp; Passiva nach HGB</span></div>
    <div class="chk" id="c0"><svg viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
  </div>

  <div class="row" id="r1">
    <div class="ico io">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
        <polyline points="2,9.5 4.5,5.5 7,7.5 9.5,3.5 11.5,5" stroke="#162D3E" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <line x1="2" y1="11" x2="11.5" y2="11" stroke="#162D3E" stroke-width="1.1" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="meta"><span class="t1">GuV erstellt</span><span class="t2">Gewinn- und Verlustrechnung</span></div>
    <div class="chk" id="c1"><svg viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
  </div>

  <div class="row" id="r2">
    <div class="ico ig">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
        <path d="M2 3.5h9M2 6h6.5M2 8.5h8" stroke="#34C759" stroke-width="1.2" stroke-linecap="round"/>
        <circle cx="10.5" cy="9.5" r="1.8" stroke="#34C759" stroke-width="1.1" fill="none"/>
        <line x1="10.5" y1="8.8" x2="10.5" y2="9.5" stroke="#34C759" stroke-width="1.1" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="meta"><span class="t1">Anhang vollständig</span><span class="t2">Alle Pflichtangaben nach §§ 284 ff. HGB</span></div>
    <div class="chk" id="c2"><svg viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
  </div>

  <div class="row" id="r3">
    <div class="ico id">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
        <circle cx="6.5" cy="6.5" r="5" stroke="#8a9fae" stroke-width="1.2" fill="none"/>
        <line x1="6.5" y1="3.5" x2="6.5" y2="7" stroke="#8a9fae" stroke-width="1.3" stroke-linecap="round"/>
        <circle cx="6.5" cy="9" r=".65" fill="#8a9fae"/>
      </svg>
    </div>
    <div class="meta"><span class="t1">Im Bundesanzeiger hinterlegt</span><span class="t2">Offenlegungspflicht erfüllt</span></div>
    <div class="chk" id="c3"><svg viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
  </div>
</div>

<script>
function scaleFont(b){
  document.documentElement.style.fontSize=
    Math.max(Math.min(document.body.clientWidth/b,22),9)+"px";
}
scaleFont(22);window.addEventListener("resize",()=>scaleFont(22));

const rows=[0,1,2,3].map(i=>document.getElementById("r"+i));
const checks=[0,1,2,3].map(i=>document.getElementById("c"+i));
const S=210,CO=440,H=3000,DI=560,DO=400;

function run(){
  rows.forEach(r=>{r.style.transition="none";r.style.opacity="0";r.style.transform="translateY(.45em)"});
  checks.forEach(c=>{c.style.transition="none";c.style.opacity="0";c.style.transform="scale(.3)"});
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    rows.forEach((r,i)=>setTimeout(()=>{
      r.style.transition=`opacity ${DI}ms cubic-bezier(.4,0,.2,1),transform ${DI}ms cubic-bezier(.4,0,.2,1)`;
      r.style.opacity="1";r.style.transform="translateY(0)";
    },i*S));
    checks.forEach((c,i)=>setTimeout(()=>{
      c.style.transition="opacity .38s ease,transform .42s cubic-bezier(.34,1.4,.64,1)";
      c.style.opacity="1";c.style.transform="scale(1)";
    },i*S+CO));
    const all=3*S+CO+560;
    setTimeout(()=>{
      rows.forEach(r=>{r.style.transition=`opacity ${DO}ms ease,transform ${DO}ms ease`;
        r.style.opacity="0";r.style.transform="translateY(-.3em)"});
      checks.forEach(c=>{c.style.transition=`opacity ${DO}ms ease`;c.style.opacity="0"});
      setTimeout(run,DO+100);
    },all+H);
  }));
}
setTimeout(run,180);
</script>
</body>
</html>
