  .anim-stage {
    position:absolute;
    top:55%;
    left:50%;
    transform:translateX(-50%);
    width:67%;
    height:38%;
    font-family:'DM Sans',sans-serif;
    color:#0E0C1C;
  }

  @keyframes spr {
    0%   { opacity:0; transform:translate(-50%,-50%) scale(.9); }
    65%  { transform:translate(-50%,-50%) scale(1.02); }
    100% { opacity:1; transform:translate(-50%,-50%) scale(1); }
  }
  @keyframes fu { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:translateY(0); } }

  .card {
    position:absolute;
    top:50%; left:50%;
    transform:translate(-50%,-50%) scale(.9);
    width:100%;
    background:#F9F4EC;
    border-radius:1.2em;
    box-shadow:0 .8em 3.5em rgba(0,0,0,.14), 0 .15em .6em rgba(0,0,0,.06);
    opacity:0; overflow:hidden;
  }
  .card.in { animation:spr .55s cubic-bezier(.25,.46,.45,.94) forwards; }

  .ch {
    padding:.65em .9em;
    border-bottom:1px solid rgba(14,12,28,.08);
    display:flex; justify-content:space-between; align-items:center;
  }
  .ch-t { font-size:.72em; font-weight:700; }

  .badge-dark {
    border-radius:100px; padding:.18em .7em;
    font-size:.52em; font-weight:600;
    background:rgba(14,12,28,.08); color:#0E0C1C;
    opacity:0; transition:opacity .4s .5s ease;
  }

  .row {
    display:flex; justify-content:space-between; align-items:center;
    padding:.58em .9em; border-bottom:1px solid rgba(14,12,28,.07);
    opacity:0; transform:translateY(4px);
    transition:opacity .4s ease, transform .4s cubic-bezier(.25,.46,.45,.94);
  }
  .row:last-child { border-bottom:none; }
  .row.in { opacity:1; transform:translateY(0); }

  .rl { font-size:.63em; color:#0E0C1C; opacity:.6; }
  .rv { font-size:.78em; font-weight:800; color:#0E0C1C; }
  .rv-before { opacity:.35; text-decoration:line-through; }
  .rv-after  { color:#0E0C1C; }

  .foot {
    padding:.5em .9em;
    background:rgba(14,12,28,.04);
    display:flex; justify-content:space-between; align-items:center;
    opacity:0; transition:opacity .5s ease;
  }
  .foot.in { opacity:1; }
  .ft { font-size:.56em; color:#0E0C1C; opacity:.55; }
  .fv { font-size:.62em; font-weight:700; color:#0E0C1C; }
</style>
</head>
<body>
<div class="hero">
  <div class="anim-stage" id="stage">
    <div class="card" id="card">
      <div class="ch">
        <span class="ch-t">Holding · Steueroptimierung</span>
        <span class="badge-dark" id="badge">Smarte Struktur</span>
      </div>
      <div class="row" id="r0"><span class="rl">Steuer vorher</span><span class="rv rv-before">30 %</span></div>
      <div class="row" id="r1"><span class="rl">Steuer nachher</span><span class="rv rv-after">&lt; 2 %</span></div>
      <div class="row" id="r2"><span class="rl">Dividenden steuerfrei</span><span class="rv">95 %</span></div>
      <div class="row" id="r3"><span class="rl">Exit-Besteuerung</span><span class="rv">0 %</span></div>
      <div class="foot" id="foot">
        <span class="ft">b'steuern Holding-Beratung</span>
        <span class="fv">Jetzt optimieren →</span>
      </div>
    </div>
  </div>
</div>

<script>
  const stage = document.getElementById('stage');
  const resize = () => {
    const w = stage.offsetWidth;
    stage.style.fontSize = Math.max(Math.min(w / 20, 26), 8) + 'px';
  };
  new ResizeObserver(resize).observe(stage);
  resize();

  const wait = ms => new Promise(r => setTimeout(r, ms));
  const $ = id => document.getElementById(id);

  async function run() {
    const c = $('card');
    c.classList.remove('in');
    ['r0','r1','r2','r3','foot'].forEach(id => $(id)?.classList.remove('in'));
    $('badge').style.opacity = '0';
    await wait(300);
    c.classList.add('in');
    await wait(400);
    for (const id of ['r0','r1','r2','r3']) { $(id).classList.add('in'); await wait(260); }
    await wait(200);
    $('foot').classList.add('in');
    $('badge').style.opacity = '1';
    await wait(5000);
    run();
  }
  run();
</script>
</body>
</html>
