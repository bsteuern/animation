<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#FF0670;font-family:"DM Sans",sans-serif;-webkit-font-smoothing:antialiased;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.stage{width:min(100vw,calc(100vh*(1116/558)));aspect-ratio:1116/558;position:relative;overflow:hidden;background:#FF0670;}
.badge{font-size:.54em;font-weight:700;padding:.2em .62em;border-radius:.28em;white-space:nowrap;opacity:0;transform:scale(.65);will-change:opacity,transform;}
.bdg-green{background:rgba(21,128,61,.11);color:#15803D;}
.bdg-pink{background:#FF0670;color:#fff;}
.bdg-dark{background:rgba(14,12,28,.09);color:#0E0C1C;}
</style>
</head>
<body>
<div class="stage" id="stage">
  <div style="width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;padding:5% 11%;gap:.35em;">

    <div id="month" style="font-size:.62em;font-weight:700;color:rgba(249,244,236,.75);letter-spacing:.05em;opacity:0;">Steuerkalender GbR 2025</div>

    <div style="display:flex;flex-direction:column;gap:.3em;">

      <!-- UStVA -->
      <div id="r0" style="display:flex;align-items:center;gap:.5em;background:#F9F4EC;border-radius:.46em;box-shadow:0 2px 14px rgba(14,12,28,.1);padding:.46em .68em;opacity:0;transform:translateY(.35em);">
        <div style="flex:1;min-width:0;">
          <div style="font-size:.67em;font-weight:600;color:#0E0C1C;">UStVA</div>
          <div style="height:.28em;background:rgba(14,12,28,.08);border-radius:.2em;margin-top:.22em;overflow:hidden;">
            <div id="p0" style="height:100%;background:#15803D;border-radius:.2em;transform:scaleX(0);transform-origin:left;transition:transform .9s cubic-bezier(.4,0,.2,1);"></div>
          </div>
        </div>
        <span style="font-size:.58em;color:rgba(14,12,28,.4);white-space:nowrap;flex-shrink:0;">10. Feb</span>
        <span class="badge bdg-green" id="b0">erledigt</span>
      </div>

      <!-- EÜR -->
      <div id="r1" style="display:flex;align-items:center;gap:.5em;background:#F9F4EC;border-radius:.46em;box-shadow:0 2px 14px rgba(14,12,28,.1);padding:.46em .68em;opacity:0;transform:translateY(.35em);">
        <div style="flex:1;min-width:0;">
          <div style="font-size:.67em;font-weight:600;color:#0E0C1C;">EÜR</div>
          <div style="height:.28em;background:rgba(14,12,28,.08);border-radius:.2em;margin-top:.22em;overflow:hidden;">
            <div id="p1" style="height:100%;background:#FF0670;border-radius:.2em;transform:scaleX(0);transform-origin:left;transition:transform .9s cubic-bezier(.4,0,.2,1);"></div>
          </div>
        </div>
        <span style="font-size:.58em;color:rgba(14,12,28,.4);white-space:nowrap;flex-shrink:0;">31. Juli</span>
        <span class="badge bdg-pink" id="b1">in Arbeit</span>
      </div>

      <!-- ESt-Erklärung -->
      <div id="r2" style="display:flex;align-items:center;gap:.5em;background:#F9F4EC;border-radius:.46em;box-shadow:0 2px 14px rgba(14,12,28,.1);padding:.46em .68em;opacity:0;transform:translateY(.35em);">
        <div style="flex:1;min-width:0;">
          <div style="font-size:.67em;font-weight:600;color:#0E0C1C;">ESt-Erklärung</div>
          <div style="height:.28em;background:rgba(14,12,28,.08);border-radius:.2em;margin-top:.22em;overflow:hidden;">
            <div id="p2" style="height:100%;background:rgba(14,12,28,.3);border-radius:.2em;transform:scaleX(0);transform-origin:left;transition:transform .9s cubic-bezier(.4,0,.2,1);"></div>
          </div>
        </div>
        <span style="font-size:.58em;color:rgba(14,12,28,.4);white-space:nowrap;flex-shrink:0;">31. Dez</span>
        <span class="badge bdg-dark" id="b2">geplant</span>
      </div>

    </div>
  </div>
</div>
<script>
const stage=document.getElementById("stage");
function sf(){const w=stage.offsetWidth,h=stage.offsetHeight;stage.style.fontSize=Math.max(Math.min(Math.min(w/28,h/14),22),9)+"px";}
new ResizeObserver(sf).observe(stage);sf();

const month=document.getElementById("month");
const rows=[0,1,2].map(i=>document.getElementById("r"+i));
const bars=[0,1,2].map(i=>document.getElementById("p"+i));
const badges=[0,1,2].map(i=>document.getElementById("b"+i));
// bar fill widths: UStVA=100%, EÜR=58%, ESt=25%
const fills=[1,.58,.25];
const H=3400,DO=450,SI=360;
const BAR_DUR=900; // bar animation duration ms

function show(){
  month.style.transition="none";month.style.opacity="0";
  rows.forEach(r=>{r.style.transition="none";r.style.opacity="0";r.style.transform="translateY(.35em)";});
  bars.forEach(b=>{b.style.transition="none";b.style.transform="scaleX(0)";});
  badges.forEach(b=>{b.style.transition="none";b.style.opacity="0";b.style.transform="scale(.65)";});

  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    month.style.transition="opacity .5s ease";month.style.opacity="1";

    rows.forEach((r,i)=>{
      // 1. Card slides in
      setTimeout(()=>{
        r.style.transition="opacity .45s ease,transform .45s cubic-bezier(.4,0,.2,1)";
        r.style.opacity="1";r.style.transform="translateY(0)";

        // 2. Bar animates after card is visible
        setTimeout(()=>{
          bars[i].style.transition=`transform ${BAR_DUR}ms cubic-bezier(.4,0,.2,1)`;
          bars[i].style.transform=`scaleX(${fills[i]})`;

          // 3. Badge pops in after bar finishes
          setTimeout(()=>{
            badges[i].style.transition="opacity .38s ease,transform .42s cubic-bezier(.34,1.5,.64,1)";
            badges[i].style.opacity="1";badges[i].style.transform="scale(1)";
          },BAR_DUR+80);
        },200);
      },i*SI);
    });

    setTimeout(()=>{
      rows.forEach(r=>{r.style.transition=`opacity ${DO}ms ease`;r.style.opacity="0";});
      month.style.transition=`opacity ${DO}ms ease`;month.style.opacity="0";
      setTimeout(show,DO+100);
    },H);
  }));
}
setTimeout(show,200);
</script>
</body>
</html>
