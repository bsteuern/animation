<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#E37383;font-family:"DM Sans",sans-serif;-webkit-font-smoothing:antialiased;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.stage{width:min(100vw,calc(100vh*(1116/558)));aspect-ratio:1116/558;position:relative;overflow:hidden;background:#E37383;}
.rc{background:#F9F4EC;border-radius:.46em;box-shadow:0 2px 14px rgba(14,12,28,.1);display:flex;align-items:center;gap:.5em;padding:.52em .72em;width:100%;opacity:0;transform:translateX(-.5em);will-change:opacity,transform;}
.badge{font-size:.59em;font-weight:700;padding:.2em .62em;border-radius:.28em;white-space:nowrap;}
</style>
</head>
<body>
<div class="stage" id="stage">
  <div style="width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;padding:5.5% 12%;gap:.32em;">
    <div class="rc" id="r0">
      <div style="width:1.85em;height:1.85em;border-radius:.34em;background:rgba(14,12,28,.07);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><circle cx="6.5" cy="5" r="2.2" stroke="#0E0C1C" stroke-width="1.2"/><path d="M2 11.5c0-2.5 2-4 4.5-4s4.5 1.5 4.5 4" stroke="#0E0C1C" stroke-width="1.2" stroke-linecap="round"/></svg>
      </div>
      <div style="flex:1;min-width:0;"><span style="font-size:.74em;font-weight:600;color:#0E0C1C;display:block;">GF-Gehalt</span><span style="font-size:.58em;color:#8A7880;">3.800 €/Monat · SV-optimiert</span></div>
      <span class="badge" style="background:rgba(14,12,28,.08);color:#0E0C1C;opacity:0;transform:scale(.7);will-change:opacity,transform;" id="b0">62 %</span>
    </div>
    <div class="rc" id="r1">
      <div style="width:1.85em;height:1.85em;border-radius:.34em;background:rgba(227,115,131,.1);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2 9l3-4 2.5 2.5L10.5 3 12 4.5" stroke="#E37383" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div style="flex:1;min-width:0;"><span style="font-size:.74em;font-weight:600;color:#0E0C1C;display:block;">Tantieme</span><span style="font-size:.58em;color:#8A7880;">12.000 €/Jahr · steuermindernd</span></div>
      <span class="badge" style="background:rgba(227,115,131,.12);color:#B04055;opacity:0;transform:scale(.7);will-change:opacity,transform;" id="b1">22 %</span>
    </div>
    <div class="rc" id="r2">
      <div style="width:1.85em;height:1.85em;border-radius:.34em;background:rgba(21,128,61,.08);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x="2" y="5.5" width="9" height="5.5" stroke="#15803D" stroke-width="1.2" rx=".4"/><path d="M4.5 5.5V4a2 2 0 014 0v1.5" stroke="#15803D" stroke-width="1.2" stroke-linecap="round"/></svg>
      </div>
      <div style="flex:1;min-width:0;"><span style="font-size:.74em;font-weight:600;color:#0E0C1C;display:block;">Ausschüttung</span><span style="font-size:.58em;color:#8A7880;">8.000 €/Jahr · 25% Abgeltung</span></div>
      <span class="badge" style="background:rgba(21,128,61,.1);color:#15803D;opacity:0;transform:scale(.7);will-change:opacity,transform;" id="b2">16 %</span>
    </div>
    <!-- Conclusion -->
    <div style="display:flex;align-items:center;justify-content:space-between;background:#F9F4EC;border:1.5px solid #E37383;padding:.52em .72em;border-radius:.46em;margin-top:.1em;box-shadow:0 2px 14px rgba(14,12,28,.08);opacity:0;transform:translateY(.28em);transition:opacity .5s ease,transform .5s ease;" id="res">
      <span style="font-size:.64em;color:rgba(14,12,28,.5);">Jährliche Steuerersparnis</span>
      <span style="font-size:.8em;font-weight:700;color:#E37383;" id="resnum">0 €</span>
    </div>
  </div>
</div>
<script>
const stage=document.getElementById("stage");
function sf(){const w=stage.offsetWidth,h=stage.offsetHeight;stage.style.fontSize=Math.max(Math.min(Math.min(w/28,h/14),22),9)+"px";}
new ResizeObserver(sf).observe(stage);sf();
const rows=[0,1,2].map(i=>document.getElementById("r"+i));
const badges=[0,1,2].map(i=>document.getElementById("b"+i));
const res=document.getElementById("res"),resNum=document.getElementById("resnum");
const H=3400,DO=450,SI=300;
const ease=t=>t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;
function cu(el,target,dur){const t0=Date.now();(function tick(){const p=Math.min((Date.now()-t0)/dur,1);el.textContent=Math.round(ease(p)*target).toLocaleString("de-DE")+" €";if(p<1)requestAnimationFrame(tick);})();}
function show(){
  rows.forEach(r=>{r.style.transition="none";r.style.opacity="0";r.style.transform="translateX(-.5em)";});
  badges.forEach(b=>{b.style.transition="none";b.style.opacity="0";b.style.transform="scale(.7)";});
  res.style.transition="none";res.style.opacity="0";res.style.transform="translateY(.28em)";resNum.textContent="0 €";
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    rows.forEach((r,i)=>{
      setTimeout(()=>{
        r.style.transition="opacity .45s ease,transform .45s cubic-bezier(.4,0,.2,1)";r.style.opacity="1";r.style.transform="translateX(0)";
        setTimeout(()=>{badges[i].style.transition="opacity .4s ease,transform .44s cubic-bezier(.34,1.5,.64,1)";badges[i].style.opacity="1";badges[i].style.transform="scale(1)";},250);
      },i*SI);
    });
    setTimeout(()=>{
      res.style.transition="opacity .5s ease,transform .55s cubic-bezier(.34,1.3,.64,1)";res.style.opacity="1";res.style.transform="translateY(0)";
      cu(resNum,14400,900);
    },3*SI+300);
    setTimeout(()=>{
      [...rows,res].forEach(e=>{e.style.transition=`opacity ${DO}ms ease`;e.style.opacity="0";});
      badges.forEach(b=>{b.style.transition=`opacity ${DO}ms ease`;b.style.opacity="0";});
      setTimeout(show,DO+100);
    },H);
  }));
}
setTimeout(show,200);
</script>
</body>
</html>
