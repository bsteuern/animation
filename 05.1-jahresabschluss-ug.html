<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#E37383;font-family:"DM Sans",sans-serif;-webkit-font-smoothing:antialiased;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.stage{width:min(100vw,calc(100vh*(1116/558)));aspect-ratio:1116/558;position:relative;overflow:hidden;background:#E37383;}
</style>
</head>
<body>
<div class="stage" id="stage">
  <div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;padding:5% 13%;">
    <div style="width:100%;background:#F9F4EC;border-radius:.46em;box-shadow:0 2px 14px rgba(14,12,28,.1);padding:.75em .95em;position:relative;opacity:0;transform:translateY(.4em);transition:opacity .6s ease,transform .6s cubic-bezier(.4,0,.2,1);" id="doc">
      <div style="display:flex;align-items:center;gap:.45em;margin-bottom:.5em;padding-bottom:.42em;border-bottom:1px solid rgba(14,12,28,.08);">
        <div style="width:1.6em;height:1.6em;background:#E37383;border-radius:.34em;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
          <svg width="11" height="11" viewBox="0 0 11 11" fill="none"><rect x="1.5" y="1" width="8" height="9" stroke="white" stroke-width="1.1" rx=".3"/><line x1="3" y1="4" x2="8" y2="4" stroke="white" stroke-width=".9" stroke-linecap="round"/><line x1="3" y1="5.8" x2="8" y2="5.8" stroke="white" stroke-width=".9" stroke-linecap="round"/><line x1="3" y1="7.5" x2="6" y2="7.5" stroke="white" stroke-width=".9" stroke-linecap="round"/></svg>
        </div>
        <span style="font-size:.74em;font-weight:700;color:#0E0C1C;">Jahresabschluss 2024</span>
      </div>
      <div style="display:flex;flex-direction:column;gap:.3em;">
        <div class="dline" style="display:flex;align-items:center;justify-content:space-between;opacity:0;transform:translateX(-.4em);transition:opacity .4s ease,transform .4s ease;"><span style="font-size:.63em;color:rgba(14,12,28,.55);">Bilanz (HGB)</span><span style="font-size:.63em;font-weight:600;color:#0E0C1C;">aufgestellt</span></div>
        <div class="dline" style="display:flex;align-items:center;justify-content:space-between;opacity:0;transform:translateX(-.4em);transition:opacity .4s ease,transform .4s ease;"><span style="font-size:.63em;color:rgba(14,12,28,.55);">GuV</span><span style="font-size:.63em;font-weight:600;color:#0E0C1C;">vollständig</span></div>
        <div class="dline" style="display:flex;align-items:center;justify-content:space-between;opacity:0;transform:translateX(-.4em);transition:opacity .4s ease,transform .4s ease;"><span style="font-size:.63em;color:rgba(14,12,28,.55);">Anhang §§ 284 HGB</span><span style="font-size:.63em;font-weight:600;color:#0E0C1C;">geprüft</span></div>
        <div class="dline" style="display:flex;align-items:center;justify-content:space-between;opacity:0;transform:translateX(-.4em);transition:opacity .4s ease,transform .4s ease;"><span style="font-size:.63em;color:rgba(14,12,28,.55);">Bundesanzeiger</span><span style="font-size:.63em;font-weight:600;color:#15803D;">fristgerecht ✓</span></div>
      </div>
      <!-- Stamp -->
      <div id="stampwrap" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0;">
        <div id="stampring" style="width:5.6em;height:5.6em;border-radius:50%;border:2.5px solid #E37383;background:transparent;display:flex;flex-direction:column;align-items:center;justify-content:center;transform:scale(1.8) rotate(-18deg);transition:transform .52s cubic-bezier(.34,1.45,.64,1);">
          <svg width="2em" height="2em" viewBox="0 0 28 28" fill="none"><path d="M5 14l7 7L23 8" stroke="#E37383" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span style="font-size:.42em;font-weight:700;color:#E37383;letter-spacing:.1em;text-transform:uppercase;margin-top:.1em;">geprüft</span>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
const stage=document.getElementById("stage");
function sf(){const w=stage.offsetWidth,h=stage.offsetHeight;stage.style.fontSize=Math.max(Math.min(Math.min(w/28,h/14),22),9)+"px";}
new ResizeObserver(sf).observe(stage);sf();
const doc=document.getElementById("doc"),lines=document.querySelectorAll(".dline");
const stampWrap=document.getElementById("stampwrap"),stampRing=document.getElementById("stampring");
const H=3600,DO=450,SI=360;
function show(){
  doc.style.transition="none";doc.style.opacity="0";doc.style.transform="translateY(.4em)";
  lines.forEach(l=>{l.style.transition="none";l.style.opacity="0";l.style.transform="translateX(-.4em)";});
  stampWrap.style.opacity="0";stampRing.style.transition="none";stampRing.style.transform="scale(1.8) rotate(-18deg)";
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    doc.style.transition="opacity .6s ease,transform .6s cubic-bezier(.4,0,.2,1)";doc.style.opacity="1";doc.style.transform="translateY(0)";
    lines.forEach((l,i)=>setTimeout(()=>{l.style.transition="opacity .38s ease,transform .38s ease";l.style.opacity="1";l.style.transform="translateX(0)";},240+i*SI));
    setTimeout(()=>{
      stampWrap.style.transition="opacity .2s ease";stampWrap.style.opacity="1";
      stampRing.style.transition="transform .52s cubic-bezier(.34,1.45,.64,1)";stampRing.style.transform="scale(1) rotate(-12deg)";
    },240+lines.length*SI+200);
    setTimeout(()=>{doc.style.transition=`opacity ${DO}ms ease`;doc.style.opacity="0";setTimeout(show,DO+100);},H);
  }));
}
setTimeout(show,180);
</script>
</body>
</html>
