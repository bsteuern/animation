<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#E37383;font-family:"DM Sans",sans-serif;-webkit-font-smoothing:antialiased;display:flex;align-items:center;justify-content:center;overflow:hidden}
.stage{width:min(100vw,calc(100vh*(1116/558)));aspect-ratio:1116/558;position:relative;overflow:hidden;background:transparent;z-index:1;display:flex;align-items:center;justify-content:center}
.card{background:#F9F4EC;border-radius:.6em;box-shadow:0 .5em 2.5em rgba(0,0,0,.18);width:18em;overflow:hidden;opacity:0;transform:translateY(.5em);transition:opacity .6s cubic-bezier(.4,0,.2,1),transform .6s cubic-bezier(.16,1,.3,1)}
.card-h{background:#0E0C1C;padding:.65em 1em;display:flex;align-items:center;justify-content:space-between}
.ch-t{font-size:.72em;font-weight:600;color:#F9F4EC}
.ch-b{font-size:.54em;font-weight:600;background:rgba(227,115,131,.25);color:#E37383;padding:.18em .55em;border-radius:20px}
.doc-body{padding:.5em 1em .7em;display:flex;flex-direction:column;gap:0}
.line{display:flex;align-items:center;justify-content:space-between;padding:.38em 0;border-bottom:1px solid rgba(14,12,28,.07);overflow:hidden}
.line:last-child{border:none}
.ll{font-size:.6em;color:rgba(14,12,28,.45)}
.lr{font-size:.64em;font-weight:600;color:#0E0C1C;display:flex;align-items:center;gap:.35em;opacity:0;transform:translateX(.4em);transition:opacity .4s ease,transform .4s cubic-bezier(.16,1,.3,1)}
.chk{width:.95em;height:.95em;border-radius:50%;background:#E37383;display:flex;align-items:center;justify-content:center;flex-shrink:0;opacity:0;transform:scale(0);transition:opacity .3s,transform .38s cubic-bezier(.34,1.5,.64,1)}
.chk svg{width:55%;height:55%}
.stamp{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-14deg) scale(0);background:#E37383;border:2.5px solid #E37383;border-radius:.35em;padding:.28em .85em;font-size:1em;font-weight:700;color:#F9F4EC;letter-spacing:.12em;opacity:0;transition:opacity .4s,transform .5s cubic-bezier(.34,1.4,.64,1);white-space:nowrap;z-index:5}

.bg-svg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
</style></head><body>
<svg class="bg-svg" viewBox="0 0 316 316" preserveAspectRatio="xMidYMid slice" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="157.602" height="157.758" transform="matrix(-4.37114e-08 1 1 4.28323e-08 0.000213623 157.602)" fill="#E37383"/>
<rect width="157.602" height="157.758" transform="matrix(-4.37114e-08 1 1 4.28323e-08 0.000213623 0.00027171)" fill="#E37383"/>
<rect width="157.602" height="157.758" transform="matrix(1 1.74846e-07 1.73966e-07 -1 157.758 315.516)" fill="#E37383"/>
<rect width="157.602" height="157.758" transform="matrix(1 1.74846e-07 1.73966e-07 -1 157.758 157.758)" fill="#E37383"/>
<path d="M157.758 157.602L157.758 157.758C178.454 157.758 198.948 153.678 218.069 145.749C237.191 137.821 254.564 126.201 269.199 111.552C283.834 96.9026 295.443 79.5115 303.363 60.3714C311.283 41.2314 315.36 20.7171 315.36 5.80872e-05L157.758 0.00028845L2.75833e-05 0.000244141C2.57739e-05 20.6968 4.08059 41.1907 12.0087 60.3119C19.9367 79.433 31.5571 96.8069 46.2063 111.442C60.8555 126.076 78.2466 137.685 97.3867 145.605C116.527 153.526 137.041 157.602 157.758 157.602Z" fill="#F4C7CD"/>
<path d="M157.758 157.758L315.36 157.758C315.36 178.475 311.283 198.989 303.363 218.129C295.443 237.269 283.834 254.66 269.199 269.31C254.564 283.959 237.191 295.579 218.069 303.507C198.948 311.435 178.454 315.516 157.758 315.516L157.758 315.204C137.041 315.204 116.527 311.127 97.3867 303.207C78.2466 295.287 60.8555 283.678 46.2063 269.043C31.5571 254.408 19.9367 237.035 12.0086 217.913C4.08058 198.792 1.19959e-05 178.298 1.38053e-05 157.602L157.758 157.602L157.758 157.758Z" fill="#F4C7CD"/></svg>
<div class="stage" id="stage">
  <div class="card" id="card" style="position:relative">
    <div class="card-h"><span class="ch-t">Jahresabschluss 2024</span><span class="ch-b">Handelsgesetzbuch</span></div>
    <div class="doc-body">
      <div class="line"><span class="ll">Bilanz</span><span class="lr" id="lr0">482.300 € = 482.300 €<div class="chk" id="c0"><svg viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="white" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/></svg></div></span></div>
      <div class="line"><span class="ll">Gewinn- &amp; Verlustrechnung</span><span class="lr" id="lr1">+ 84.200 €<div class="chk" id="c1"><svg viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="white" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/></svg></div></span></div>
      <div class="line"><span class="ll">Anhang §§ 284 ff. HGB</span><span class="lr" id="lr2">Vollständig<div class="chk" id="c2"><svg viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="white" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/></svg></div></span></div>
      <div class="line"><span class="ll">Bundesanzeiger</span><span class="lr" id="lr3">Fristgerecht<div class="chk" id="c3"><svg viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="white" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/></svg></div></span></div>
    </div>
    <div class="stamp" id="stamp">FERTIG</div>
  </div>
</div>
<script>
const stage=document.getElementById("stage");
function sf(){const w=stage.offsetWidth,h=stage.offsetHeight;document.documentElement.style.fontSize=Math.max(Math.min(Math.min(w/18.7,h/9.3),22),9)+"px"}
new ResizeObserver(sf).observe(stage);sf();
const card=document.getElementById("card"),stamp=document.getElementById("stamp");
const lrs=[0,1,2,3].map(i=>document.getElementById("lr"+i));
const chks=[0,1,2,3].map(i=>document.getElementById("c"+i));
const H=4000,DO=600;
function run(){
  card.style.transition="none";card.style.opacity="0";card.style.transform="translateY(.5em)";
  lrs.forEach(l=>{l.style.transition="none";l.style.opacity="0";l.style.transform="translateX(.4em)"});
  chks.forEach(c=>{c.style.transition="none";c.style.opacity="0";c.style.transform="scale(0)"});
  stamp.style.transition="none";stamp.style.opacity="0";stamp.style.transform="translate(-50%,-50%) rotate(-14deg) scale(0)";
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    card.style.transition="opacity .6s cubic-bezier(.4,0,.2,1),transform .6s cubic-bezier(.16,1,.3,1)";card.style.opacity="1";card.style.transform="none";
    lrs.forEach((l,i)=>setTimeout(()=>{l.style.transition="opacity .4s ease,transform .4s cubic-bezier(.16,1,.3,1)";l.style.opacity="1";l.style.transform="none";setTimeout(()=>{chks[i].style.transition="opacity .3s,transform .38s cubic-bezier(.34,1.5,.64,1)";chks[i].style.opacity="1";chks[i].style.transform="scale(1)"},300)},400+i*300));
    setTimeout(()=>{stamp.style.transition="opacity .4s,transform .5s cubic-bezier(.34,1.4,.64,1)";stamp.style.opacity="1";stamp.style.transform="translate(-50%,-50%) rotate(-14deg) scale(1)"},400+4*300+200);
    setTimeout(()=>{const t=`opacity ${DO}ms ease`;[card].forEach(el=>{el.style.transition=t;el.style.opacity="0"});setTimeout(run,DO+150)},400+4*300+H);
  }));
}
setTimeout(run,250);
</script></body></html>
